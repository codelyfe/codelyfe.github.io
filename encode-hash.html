<!doctype html>
<html lang="en">
<!-- Randal C. Burger Jr -->
<head>
  <meta charset="utf-8" />
  <title>Encode & Hash — Codelyfe</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <meta name="theme-color" content="#0ea5e9" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    :root{--panel:#0f172a;--text:#e5f0ff;--muted:#9db3d1;--brand:#0ea5e9;--brand-2:#14b8a6;--accent:#a78bfa;--ring:0 0 0 3px color-mix(in srgb, var(--brand) 35%, transparent);--glass:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.03));--speed-1:300ms}
    @media (prefers-color-scheme: light){:root{--bg:#f7fbff;--panel:#fff;--text:#0b1220;--muted:#44566c;--glass:linear-gradient(180deg,#fff,#fff7)}}
    *{box-sizing:border-box} html,body{min-height:100%;margin:0}
    body{font:16px/1.55 Inter,system-ui,sans-serif;color:var(--text);background:radial-gradient(1200px 600px at 80% -20%,rgba(78,205,255,.22),transparent 60%),radial-gradient(1000px 600px at -10% -10%,rgba(167,139,250,.22),transparent 55%),var(--bg);overflow-x:hidden}
    a{color:var(--brand);text-decoration:none} a:focus-visible,button:focus-visible,input:focus-visible,textarea:focus-visible{outline:none;box-shadow:var(--ring)}
    .app{min-height:100%;display:grid;grid-template-rows:auto 1fr auto}
    header{position:sticky;top:0;z-index:10;backdrop-filter:saturate(120%) blur(6px);background:linear-gradient(180deg,rgba(2,8,23,.55),rgba(2,8,23,.15));border-bottom:1px solid rgba(148,163,184,.15)}
    .bar{max-width:900px;margin:0 auto;padding:14px 18px;display:flex;align-items:center;justify-content:space-between}
    .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px} .brand a{color:var(--text)}
    .logo{width:32px;height:32px;border-radius:10px;background:conic-gradient(from 180deg,var(--brand),var(--brand-2),var(--accent),var(--brand))}
    .btn{border:1px solid #94a3b83f;background:var(--glass);color:var(--text);padding:10px 14px;border-radius:12px;cursor:pointer;font:600 14px/1 Inter,sans-serif;transition:transform var(--speed-1)} .btn:hover{transform:translateY(-2px)}
    main{max-width:900px;margin:32px auto;padding:0 18px}
    h1{font-weight:800;font-size:clamp(26px,4vw,34px);margin:0 0 8px} .subtitle{color:var(--muted);font-size:15px;margin-bottom:28px}
    .card{background:var(--panel);border-radius:16px;padding:24px;border:1px solid #94a3b82f;margin-bottom:20px}
    .tabs{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px} .tab{padding:10px 16px;border-radius:10px;border:1px solid #94a3b83f;background:var(--glass);color:var(--muted);cursor:pointer;font-weight:600} .tab.active{color:var(--text);border-color:var(--brand);background:rgba(14,165,233,.12)}
    .panel{display:none} .panel.visible{display:block}
    label{display:block;font-size:14px;font-weight:600;color:var(--muted);margin-bottom:8px}
    textarea{width:100%;min-height:120px;padding:14px;border-radius:12px;border:1px solid #94a3b83f;background:#0c1222;color:var(--text);font:14px/1.5 JetBrains Mono,monospace;resize:vertical}
    .toolbar{display:flex;flex-wrap:wrap;gap:10px;margin:12px 0}
    .drop-zone{border:2px dashed #94a3b85c;border-radius:14px;padding:24px;text-align:center;color:var(--muted);cursor:pointer;margin-bottom:12px} .drop-zone:hover{border-color:var(--brand)}
    .drop-zone input{display:none}
    .err{color:#f87171;font-size:14px} footer{padding:24px 18px;color:var(--muted);text-align:center;border-top:1px solid #94a3b826}
  </style>
</head>
<body>
  <div class="app">
    <header><div class="bar"><div class="brand"><a href="index.html"><span class="logo" aria-hidden="true"></span>CODELYFE</a></div><a class="btn" href="index.html">Home</a></div></header>
    <main>
      <h1>Encode & Hash</h1>
      <p class="subtitle">Base64 and URL encode/decode, SHA-256 hash. All in the browser.</p>
      <div class="card">
        <div class="tabs">
          <button type="button" class="tab active" data-tab="b64">Base64</button>
          <button type="button" class="tab" data-tab="url">URL</button>
          <button type="button" class="tab" data-tab="hash">SHA-256</button>
        </div>
        <div id="panelB64" class="panel visible">
          <label for="b64In">Input</label>
          <div class="toolbar"><button type="button" class="btn" id="b64Enc">Encode</button><button type="button" class="btn" id="b64Dec">Decode</button><button type="button" class="btn" id="b64File">From file</button></div>
          <textarea id="b64In" placeholder="Text or Base64 string"></textarea>
          <div class="drop-zone" id="b64Drop"><input type="file" id="b64FileIn" /> Drop a file or click to encode as Base64</div>
          <p class="err" id="b64Err"></p>
        </div>
        <div id="panelUrl" class="panel">
          <label for="urlIn">Input</label>
          <div class="toolbar"><button type="button" class="btn" id="urlEnc">Encode</button><button type="button" class="btn" id="urlDec">Decode</button></div>
          <textarea id="urlIn" placeholder="Text or URL-encoded string"></textarea>
          <p class="err" id="urlErr"></p>
        </div>
        <div id="panelHash" class="panel">
          <label for="hashIn">Input (hashed as UTF-8)</label>
          <div class="toolbar"><button type="button" class="btn" id="hashBtn">Hash SHA-256</button></div>
          <textarea id="hashIn" placeholder="Enter text to hash"></textarea>
          <label style="margin-top:12px">SHA-256 (hex)</label>
          <textarea id="hashOut" placeholder="Hash result" readonly style="min-height:60px"></textarea>
        </div>
      </div>
    </main>
    <footer><a href="index.html">Codelyfe</a> — Encode & hash</footer>
  </div>
  <script>
(function(){
  var tabToPanel = { b64: "panelB64", url: "panelUrl", hash: "panelHash" };
  document.querySelectorAll(".tab").forEach(function(t){
    t.addEventListener("click", function(){
      document.querySelectorAll(".tab").forEach(function(x){ x.classList.remove("active"); });
      document.querySelectorAll("[id^=panel]").forEach(function(p){ p.classList.remove("visible"); });
      t.classList.add("active");
      var p = document.getElementById(tabToPanel[t.getAttribute("data-tab")]);
      if (p) p.classList.add("visible");
    });
  });
  document.getElementById("b64Enc").addEventListener("click", function(){
    var ta = document.getElementById("b64In"); var err = document.getElementById("b64Err");
    try { ta.value = btoa(unescape(encodeURIComponent(ta.value))); err.textContent = ""; } catch(e) { err.textContent = e.message; }
  });
  document.getElementById("b64Dec").addEventListener("click", function(){
    var ta = document.getElementById("b64In"); var err = document.getElementById("b64Err");
    try { ta.value = decodeURIComponent(escape(atob(ta.value))); err.textContent = ""; } catch(e) { err.textContent = e.message; }
  });
  document.getElementById("b64File").addEventListener("click", function(){ document.getElementById("b64FileIn").click(); });
  document.getElementById("b64Drop").addEventListener("click", function(){ document.getElementById("b64FileIn").click(); });
  document.getElementById("b64Drop").addEventListener("dragover", function(e){ e.preventDefault(); this.style.borderColor = "var(--brand)"; });
  document.getElementById("b64Drop").addEventListener("dragleave", function(){ this.style.borderColor = ""; });
  document.getElementById("b64Drop").addEventListener("drop", function(e){ e.preventDefault(); this.style.borderColor = ""; var f = e.dataTransfer.files[0]; if (f) readFileB64(f); });
  document.getElementById("b64FileIn").addEventListener("change", function(){ var f = this.files[0]; if (f) readFileB64(f); });
  function readFileB64(file){
    var r = new FileReader();
    r.onload = function(){ document.getElementById("b64In").value = btoa(String.fromCharCode.apply(null, new Uint8Array(r.result))); };
    r.readAsArrayBuffer(file);
  }
  document.getElementById("urlEnc").addEventListener("click", function(){
    var ta = document.getElementById("urlIn"); document.getElementById("urlErr").textContent = "";
    try { ta.value = encodeURIComponent(ta.value); } catch(e) { document.getElementById("urlErr").textContent = e.message; }
  });
  document.getElementById("urlDec").addEventListener("click", function(){
    var ta = document.getElementById("urlIn"); var err = document.getElementById("urlErr");
    try { ta.value = decodeURIComponent(ta.value.replace(/\+/g, " ")); err.textContent = ""; } catch(e) { err.textContent = e.message; }
  });
  document.getElementById("hashBtn").addEventListener("click", function(){
    var str = document.getElementById("hashIn").value;
    var enc = new TextEncoder().encode(str);
    crypto.subtle.digest("SHA-256", enc).then(function(buf){
      var arr = Array.from(new Uint8Array(buf));
      var hex = arr.map(function(b){ return ("0" + b.toString(16)).slice(-2); }).join("");
      document.getElementById("hashOut").value = hex;
    }).catch(function(e){ document.getElementById("hashOut").value = "Error: " + e.message; });
  });
})();
  </script>
</body>
</html>
