<!doctype html>
<html lang="en">
<!-- Randal C. Burger Jr -->
<head>
  <meta charset="utf-8" />
  <title>Text Compressor — Codelyfe</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <meta name="theme-color" content="#0ea5e9" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    :root{--panel:#0f172a;--text:#e5f0ff;--muted:#9db3d1;--brand:#0ea5e9;--brand-2:#14b8a6;--accent:#a78bfa;--ring:0 0 0 3px color-mix(in srgb, var(--brand) 35%, transparent);--glass:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.03));--speed-1:300ms}
    @media (prefers-color-scheme: light){:root{--bg:#f7fbff;--panel:#fff;--text:#0b1220;--muted:#44566c;--glass:linear-gradient(180deg,#fff,#fff7)}}
    *{box-sizing:border-box} html,body{min-height:100%;margin:0}
    body{font:16px/1.55 Inter,system-ui,sans-serif;color:var(--text);background:radial-gradient(1200px 600px at 80% -20%,rgba(78,205,255,.22),transparent 60%),radial-gradient(1000px 600px at -10% -10%,rgba(167,139,250,.22),transparent 55%),var(--bg);overflow-x:hidden}
    a{color:var(--brand);text-decoration:none} a:focus-visible,button:focus-visible,input:focus-visible,textarea:focus-visible{outline:none;box-shadow:var(--ring)}
    .app{min-height:100%;display:grid;grid-template-rows:auto 1fr auto}
    header{position:sticky;top:0;z-index:10;backdrop-filter:saturate(120%) blur(6px);background:linear-gradient(180deg,rgba(2,8,23,.55),rgba(2,8,23,.15));border-bottom:1px solid rgba(148,163,184,.15)}
    .bar{max-width:900px;margin:0 auto;padding:14px 18px;display:flex;align-items:center;justify-content:space-between}
    .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px} .brand a{color:var(--text)}
    .logo{width:32px;height:32px;border-radius:10px;background:conic-gradient(from 180deg,var(--brand),var(--brand-2),var(--accent),var(--brand))}
    .btn{border:1px solid #94a3b83f;background:var(--glass);color:var(--text);padding:10px 14px;border-radius:12px;cursor:pointer;font:600 14px/1 Inter,sans-serif;transition:transform var(--speed-1)} .btn:hover{transform:translateY(-2px)}
    main{max-width:900px;margin:32px auto;padding:0 18px}
    h1{font-weight:800;font-size:clamp(26px,4vw,34px);margin:0 0 8px} .subtitle{color:var(--muted);font-size:15px;margin-bottom:28px}
    .card{background:var(--panel);border-radius:16px;padding:24px;border:1px solid #94a3b82f;margin-bottom:20px}
    .tabs{display:flex;gap:8px;margin-bottom:20px} .tab{padding:10px 16px;border-radius:10px;border:1px solid #94a3b83f;background:var(--glass);color:var(--muted);cursor:pointer;font-weight:600} .tab.active{color:var(--text);border-color:var(--brand);background:rgba(14,165,233,.12)}
    .panel{display:none} .panel.visible{display:block}
    label{display:block;font-size:14px;font-weight:600;color:var(--muted);margin-bottom:8px}
    textarea{width:100%;min-height:160px;padding:14px;border-radius:12px;border:1px solid #94a3b83f;background:#0c1222;color:var(--text);font:14px JetBrains Mono,monospace;resize:vertical}
    .toolbar{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px}
    .stats{font-size:13px;color:var(--muted);margin-top:8px}
    .err{color:#f87171;font-size:14px;margin-top:10px} footer{padding:24px 18px;color:var(--muted);text-align:center;border-top:1px solid #94a3b826}
  </style>
</head>
<body>
  <div class="app">
    <header><div class="bar"><div class="brand"><a href="index.html"><span class="logo" aria-hidden="true"></span>CODELYFE</a></div><a class="btn" href="index.html">Home</a></div></header>
    <main>
      <h1>Text Compressor</h1>
      <p class="subtitle">Compress text (JSON, config, etc.) to a short string for sharing or URLs. Uses LZ-String.</p>
      <div class="card">
        <div class="tabs">
          <button type="button" class="tab active" data-tab="compress">Compress</button>
          <button type="button" class="tab" data-tab="decompress">Decompress</button>
        </div>
        <div id="panelCompress" class="panel visible">
          <label for="compressIn">Text to compress</label>
          <textarea id="compressIn" placeholder="Paste or type text…"></textarea>
          <div class="toolbar"><button type="button" class="btn" id="compressBtn">Compress</button><button type="button" class="btn" id="copyCompressed">Copy result</button></div>
          <label for="compressOut">Compressed (base64)</label>
          <textarea id="compressOut" readonly placeholder="Compressed output"></textarea>
          <p class="stats" id="compressStats"></p>
        </div>
        <div id="panelDecompress" class="panel">
          <label for="decompressIn">Compressed string to decompress</label>
          <textarea id="decompressIn" placeholder="Paste compressed string…"></textarea>
          <div class="toolbar"><button type="button" class="btn" id="decompressBtn">Decompress</button><button type="button" class="btn" id="copyDecompressed">Copy result</button></div>
          <label for="decompressOut">Decompressed text</label>
          <textarea id="decompressOut" readonly placeholder="Decompressed output"></textarea>
        </div>
        <p class="err" id="err"></p>
      </div>
    </main>
    <footer><a href="index.html">Codelyfe</a> — Text compressor</footer>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>
  <script>
(function(){
  var tabToPanel = { compress: "panelCompress", decompress: "panelDecompress" };
  document.querySelectorAll(".tab").forEach(function(t){
    t.addEventListener("click", function(){
      document.querySelectorAll(".tab").forEach(function(x){ x.classList.remove("active"); });
      document.querySelectorAll("[id^=panel]").forEach(function(p){ p.classList.remove("visible"); });
      t.classList.add("active");
      var p = document.getElementById(tabToPanel[t.getAttribute("data-tab")]);
      if (p) p.classList.add("visible");
    });
  });
  var err = document.getElementById("err");
  document.getElementById("compressBtn").addEventListener("click", function(){
    err.textContent = "";
    var raw = document.getElementById("compressIn").value;
    if (typeof LZString === "undefined") { err.textContent = "LZString not loaded."; return; }
    var compressed = LZString.compressToBase64(raw);
    document.getElementById("compressOut").value = compressed;
    var stats = document.getElementById("compressStats");
    if (raw.length && compressed.length) stats.textContent = "Original: " + raw.length + " chars → Compressed: " + compressed.length + " chars (" + (100 * compressed.length / raw.length).toFixed(0) + "%)";
    else stats.textContent = "";
  });
  document.getElementById("copyCompressed").addEventListener("click", function(){ var v = document.getElementById("compressOut").value; if (v) navigator.clipboard.writeText(v); });
  document.getElementById("decompressBtn").addEventListener("click", function(){
    err.textContent = "";
    var compressed = document.getElementById("decompressIn").value.trim();
    if (typeof LZString === "undefined") { err.textContent = "LZString not loaded."; return; }
    var out = LZString.decompressFromBase64(compressed);
    document.getElementById("decompressOut").value = out !== null && out !== "" ? out : (LZString.decompressFromEncodedURIComponent(compressed) || "Could not decompress. Check the input.");
  });
  document.getElementById("copyDecompressed").addEventListener("click", function(){ var v = document.getElementById("decompressOut").value; if (v) navigator.clipboard.writeText(v); });
})();
  </script>
</body>
</html>
