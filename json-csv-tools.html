<!doctype html>
<html lang="en">
<!-- Randal C. Burger Jr -->
<head>
  <meta charset="utf-8" />
  <title>JSON & CSV Tools — Codelyfe</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <meta name="theme-color" content="#0ea5e9" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    :root{--panel:#0f172a;--text:#e5f0ff;--muted:#9db3d1;--brand:#0ea5e9;--brand-2:#14b8a6;--accent:#a78bfa;--ring:0 0 0 3px color-mix(in srgb, var(--brand) 35%, transparent);--glass:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.03));--speed-1:300ms}
    @media (prefers-color-scheme: light){:root{--bg:#f7fbff;--panel:#fff;--text:#0b1220;--muted:#44566c;--glass:linear-gradient(180deg,#fff,#fff7)}}
    *{box-sizing:border-box} html,body{min-height:100%;margin:0}
    body{font:16px/1.55 Inter,system-ui,sans-serif;color:var(--text);background:radial-gradient(1200px 600px at 80% -20%,rgba(78,205,255,.22),transparent 60%),radial-gradient(1000px 600px at -10% -10%,rgba(167,139,250,.22),transparent 55%),var(--bg);overflow-x:hidden}
    a{color:var(--brand);text-decoration:none} a:focus-visible,button:focus-visible,input:focus-visible,textarea:focus-visible{outline:none;box-shadow:var(--ring)}
    .app{min-height:100%;display:grid;grid-template-rows:auto 1fr auto}
    header{position:sticky;top:0;z-index:10;backdrop-filter:saturate(120%) blur(6px);background:linear-gradient(180deg,rgba(2,8,23,.55),rgba(2,8,23,.15));border-bottom:1px solid rgba(148,163,184,.15)}
    .bar{max-width:1000px;margin:0 auto;padding:14px 18px;display:flex;align-items:center;justify-content:space-between}
    .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px} .brand a{color:var(--text)}
    .logo{width:32px;height:32px;border-radius:10px;background:conic-gradient(from 180deg,var(--brand),var(--brand-2),var(--accent),var(--brand))}
    .btn{border:1px solid #94a3b83f;background:var(--glass);color:var(--text);padding:10px 14px;border-radius:12px;cursor:pointer;font:600 14px/1 Inter,sans-serif;transition:transform var(--speed-1)} .btn:hover{transform:translateY(-2px)}
    main{max-width:1000px;margin:32px auto;padding:0 18px}
    h1{font-weight:800;font-size:clamp(26px,4vw,34px);margin:0 0 8px} .subtitle{color:var(--muted);font-size:15px;margin-bottom:28px}
    .card{background:var(--panel);border-radius:16px;padding:24px;border:1px solid #94a3b82f;margin-bottom:20px}
    .tabs{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px} .tab{padding:10px 16px;border-radius:10px;border:1px solid #94a3b83f;background:var(--glass);color:var(--muted);cursor:pointer;font-weight:600} .tab.active{color:var(--text);border-color:var(--brand);background:rgba(14,165,233,.12)}
    .panel{display:none} .panel.visible{display:block}
    label{display:block;font-size:14px;font-weight:600;color:var(--muted);margin-bottom:8px}
    textarea{width:100%;min-height:200px;padding:14px;border-radius:12px;border:1px solid #94a3b83f;background:#0c1222;color:var(--text);font:14px/1.5 JetBrains Mono,ui-monospace,monospace;resize:vertical}
    .toolbar{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px}
    .ok{color:var(--brand-2)} .err{color:#f87171;font-size:14px;margin-top:8px} footer{padding:24px 18px;color:var(--muted);text-align:center;border-top:1px solid #94a3b826}
  </style>
</head>
<body>
  <div class="app">
    <header><div class="bar"><div class="brand"><a href="index.html"><span class="logo" aria-hidden="true"></span>CODELYFE</a></div><a class="btn" href="index.html">Home</a></div></header>
    <main>
      <h1>JSON & CSV Tools</h1>
      <p class="subtitle">Format, validate, minify JSON and convert between JSON and CSV. Uses Papa Parse for CSV.</p>
      <div class="card">
        <div class="tabs">
          <button type="button" class="tab active" data-tab="format">Format JSON</button>
          <button type="button" class="tab" data-tab="minify">Minify JSON</button>
          <button type="button" class="tab" data-tab="json2csv">JSON → CSV</button>
          <button type="button" class="tab" data-tab="csv2json">CSV → JSON</button>
        </div>
        <div id="panelFormat" class="panel visible">
          <label for="fmtIn">JSON input</label>
          <div class="toolbar"><button type="button" class="btn" id="fmtBtn">Format & validate</button><button type="button" class="btn" id="copyFmt">Copy</button></div>
          <textarea id="fmtIn" placeholder='{"name": "value"}'></textarea>
          <p class="err" id="fmtErr"></p>
        </div>
        <div id="panelMinify" class="panel">
          <label for="minIn">JSON input</label>
          <div class="toolbar"><button type="button" class="btn" id="minBtn">Minify</button><button type="button" class="btn" id="copyMin">Copy</button></div>
          <textarea id="minIn" placeholder='{"name": "value"}'></textarea>
          <p class="err" id="minErr"></p>
        </div>
        <div id="panelJson2csv" class="panel">
          <label for="j2cIn">JSON array (one object per row)</label>
          <div class="toolbar"><button type="button" class="btn" id="j2cBtn">Convert to CSV</button><button type="button" class="btn" id="copyJ2c">Copy CSV</button></div>
          <textarea id="j2cIn" placeholder='[{"a":1,"b":2},{"a":3,"b":4}]'></textarea>
          <p class="err" id="j2cErr"></p>
        </div>
        <div id="panelCsv2json" class="panel">
          <label for="c2jIn">CSV input</label>
          <div class="toolbar"><button type="button" class="btn" id="c2jBtn">Convert to JSON</button><button type="button" class="btn" id="copyC2j">Copy JSON</button></div>
          <textarea id="c2jIn" placeholder="name,age\nAlice,30\nBob,25"></textarea>
          <p class="err" id="c2jErr"></p>
        </div>
      </div>
    </main>
    <footer><a href="index.html">Codelyfe</a> — JSON & CSV tools</footer>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script>
(function(){
  var tabToPanel = { format: "panelFormat", minify: "panelMinify", json2csv: "panelJson2csv", csv2json: "panelCsv2json" };
  document.querySelectorAll(".tab").forEach(function(t){
    t.addEventListener("click", function(){
      document.querySelectorAll(".tab").forEach(function(x){ x.classList.remove("active"); });
      document.querySelectorAll("[id^=panel]").forEach(function(p){ p.classList.remove("visible"); });
      t.classList.add("active");
      var pid = tabToPanel[t.getAttribute("data-tab")];
      if (pid) { var p = document.getElementById(pid); if (p) p.classList.add("visible"); }
    });
  });

  document.getElementById("fmtBtn").addEventListener("click", function(){
    var ta = document.getElementById("fmtIn"); var err = document.getElementById("fmtErr");
    try { var o = JSON.parse(ta.value); ta.value = JSON.stringify(o, null, 2); err.textContent = "Valid JSON. Formatted."; err.className = "ok"; } catch(e) { err.textContent = e.message; err.className = "err"; }
  });
  document.getElementById("copyFmt").addEventListener("click", function(){ var ta = document.getElementById("fmtIn"); navigator.clipboard.writeText(ta.value); });
  document.getElementById("minBtn").addEventListener("click", function(){
    var ta = document.getElementById("minIn"); var err = document.getElementById("minErr");
    try { var o = JSON.parse(ta.value); ta.value = JSON.stringify(o); err.textContent = "Minified."; err.className = "ok"; } catch(e) { err.textContent = e.message; err.className = "err"; }
  });
  document.getElementById("copyMin").addEventListener("click", function(){ var ta = document.getElementById("minIn"); navigator.clipboard.writeText(ta.value); });
  document.getElementById("j2cBtn").addEventListener("click", function(){
    var ta = document.getElementById("j2cIn"); var err = document.getElementById("j2cErr");
    try { var arr = JSON.parse(ta.value); if (!Array.isArray(arr)) throw new Error("Input must be a JSON array"); var csv = window.Papa && Papa.unparse(arr); ta.value = csv || ""; err.textContent = csv ? "Converted." : "No output."; err.className = "ok"; } catch(e) { err.textContent = e.message; err.className = "err"; }
  });
  document.getElementById("copyJ2c").addEventListener("click", function(){ navigator.clipboard.writeText(document.getElementById("j2cIn").value); });
  document.getElementById("c2jBtn").addEventListener("click", function(){
    var ta = document.getElementById("c2jIn"); var err = document.getElementById("c2jErr");
    try { var r = window.Papa && Papa.parse(ta.value, { header: true }); ta.value = JSON.stringify(r.data, null, 2); err.textContent = "Converted."; err.className = "ok"; } catch(e) { err.textContent = e.message; err.className = "err"; }
  });
  document.getElementById("copyC2j").addEventListener("click", function(){ var ta = document.getElementById("c2jIn"); navigator.clipboard.writeText(ta.value); });
})();
  </script>
</body>
</html>
