<!doctype html>
<html lang="en">
<!-- Randal C. Burger Jr -->
<head>
  <meta charset="utf-8" />
  <title>Timestamp Converter — Codelyfe</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <meta name="theme-color" content="#0ea5e9" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    :root{--panel:#0f172a;--text:#e5f0ff;--muted:#9db3d1;--brand:#0ea5e9;--brand-2:#14b8a6;--accent:#a78bfa;--ring:0 0 0 3px color-mix(in srgb, var(--brand) 35%, transparent);--glass:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.03));--speed-1:300ms}
    @media (prefers-color-scheme: light){:root{--bg:#f7fbff;--panel:#fff;--text:#0b1220;--muted:#44566c;--glass:linear-gradient(180deg,#fff,#fff7)}}
    *{box-sizing:border-box} html,body{min-height:100%;margin:0}
    body{font:16px/1.55 Inter,system-ui,sans-serif;color:var(--text);background:radial-gradient(1200px 600px at 80% -20%,rgba(78,205,255,.22),transparent 60%),radial-gradient(1000px 600px at -10% -10%,rgba(167,139,250,.22),transparent 55%),var(--bg);overflow-x:hidden}
    a{color:var(--brand);text-decoration:none} a:focus-visible,button:focus-visible,input:focus-visible{outline:none;box-shadow:var(--ring)}
    .app{min-height:100%;display:grid;grid-template-rows:auto 1fr auto}
    header{position:sticky;top:0;z-index:10;backdrop-filter:saturate(120%) blur(6px);background:linear-gradient(180deg,rgba(2,8,23,.55),rgba(2,8,23,.15));border-bottom:1px solid rgba(148,163,184,.15)}
    .bar{max-width:900px;margin:0 auto;padding:14px 18px;display:flex;align-items:center;justify-content:space-between}
    .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px} .brand a{color:var(--text)}
    .logo{width:32px;height:32px;border-radius:10px;background:conic-gradient(from 180deg,var(--brand),var(--brand-2),var(--accent),var(--brand))}
    .btn{border:1px solid #94a3b83f;background:var(--glass);color:var(--text);padding:10px 14px;border-radius:12px;cursor:pointer;font:600 14px/1 Inter,sans-serif;transition:transform var(--speed-1)} .btn:hover{transform:translateY(-2px)}
    main{max-width:700px;margin:32px auto;padding:0 18px}
    h1{font-weight:800;font-size:clamp(26px,4vw,34px);margin:0 0 8px} .subtitle{color:var(--muted);font-size:15px;margin-bottom:28px}
    .card{background:var(--panel);border-radius:16px;padding:24px;border:1px solid #94a3b82f;margin-bottom:20px}
    label{display:block;font-size:14px;font-weight:600;color:var(--muted);margin-bottom:8px}
    input[type="text"],input[type="number"]{width:100%;max-width:320px;padding:12px 14px;border-radius:12px;border:1px solid #94a3b83f;background:var(--panel);color:var(--text);font:14px JetBrains Mono,monospace}
    .row{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-bottom:16px}
    .out-box{padding:14px;border-radius:12px;background:rgba(20,184,166,.12);border:1px solid rgba(20,184,166,.4);font:14px JetBrains Mono,monospace;margin-top:12px}
    .err{color:#f87171;font-size:14px} footer{padding:24px 18px;color:var(--muted);text-align:center;border-top:1px solid #94a3b826}
  </style>
</head>
<body>
  <div class="app">
    <header><div class="bar"><div class="brand"><a href="index.html"><span class="logo" aria-hidden="true"></span>CODELYFE</a></div><a class="btn" href="index.html">Home</a></div></header>
    <main>
      <h1>Timestamp Converter</h1>
      <p class="subtitle">Convert between Unix timestamp (seconds or milliseconds) and human-readable date/time in UTC and local.</p>
      <div class="card">
        <label for="tsIn">Unix timestamp (seconds or milliseconds)</label>
        <div class="row">
          <input type="text" id="tsIn" placeholder="e.g. 1710000000 or 1710000000000" />
          <button type="button" class="btn" id="toDate">To date</button>
          <button type="button" class="btn" id="nowBtn">Now</button>
        </div>
        <div id="dateOut" class="out-box" style="display:none"></div>
        <label style="margin-top:24px" for="dateStrIn">Or enter date/time (ISO or common format)</label>
        <div class="row">
          <input type="text" id="dateStrIn" placeholder="e.g. 2024-03-10 12:00:00" style="max-width:400px" />
          <button type="button" class="btn" id="toTs">To timestamp</button>
        </div>
        <div id="tsOut" class="out-box" style="display:none"></div>
        <p class="err" id="err"></p>
      </div>
    </main>
    <footer><a href="index.html">Codelyfe</a> — Timestamp converter</footer>
  </div>
  <script>
(function(){
  var err = document.getElementById("err");
  document.getElementById("toDate").addEventListener("click", function(){
    var s = document.getElementById("tsIn").value.trim();
    err.textContent = "";
    document.getElementById("dateOut").style.display = "none";
    if (!s) return;
    var n = parseInt(s, 10);
    if (isNaN(n)) { err.textContent = "Invalid number."; return; }
    if (n < 1e10) n *= 1000;
    var d = new Date(n);
    if (isNaN(d.getTime())) { err.textContent = "Invalid timestamp."; return; }
    document.getElementById("dateOut").innerHTML = "UTC: " + d.toISOString() + "<br>Local: " + d.toString();
    document.getElementById("dateOut").style.display = "block";
  });
  document.getElementById("nowBtn").addEventListener("click", function(){
    document.getElementById("tsIn").value = Date.now();
    document.getElementById("toDate").click();
  });
  document.getElementById("toTs").addEventListener("click", function(){
    var s = document.getElementById("dateStrIn").value.trim();
    err.textContent = "";
    document.getElementById("tsOut").style.display = "none";
    if (!s) return;
    var d = new Date(s);
    if (isNaN(d.getTime())) { err.textContent = "Could not parse date."; return; }
    document.getElementById("tsOut").textContent = "Seconds: " + Math.floor(d.getTime()/1000) + "  |  Milliseconds: " + d.getTime();
    document.getElementById("tsOut").style.display = "block";
  });
})();
  </script>
</body>
</html>
