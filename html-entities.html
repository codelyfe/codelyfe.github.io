<!doctype html>
<html lang="en">
<!-- Randal C. Burger Jr -->
<head>
  <meta charset="utf-8" />
  <title>HTML Entities — Codelyfe</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <meta name="theme-color" content="#0ea5e9" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    :root{--panel:#0f172a;--text:#e5f0ff;--muted:#9db3d1;--brand:#0ea5e9;--brand-2:#14b8a6;--accent:#a78bfa;--ring:0 0 0 3px color-mix(in srgb, var(--brand) 35%, transparent);--glass:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.03));--speed-1:300ms}
    @media (prefers-color-scheme: light){:root{--bg:#f7fbff;--panel:#fff;--text:#0b1220;--muted:#44566c;--glass:linear-gradient(180deg,#fff,#fff7)}}
    *{box-sizing:border-box} html,body{min-height:100%;margin:0}
    body{font:16px/1.55 Inter,system-ui,sans-serif;color:var(--text);background:radial-gradient(1200px 600px at 80% -20%,rgba(78,205,255,.22),transparent 60%),radial-gradient(1000px 600px at -10% -10%,rgba(167,139,250,.22),transparent 55%),var(--bg);overflow-x:hidden}
    a{color:var(--brand);text-decoration:none} a:focus-visible,button:focus-visible,input:focus-visible,textarea:focus-visible{outline:none;box-shadow:var(--ring)}
    .app{min-height:100%;display:grid;grid-template-rows:auto 1fr auto}
    header{position:sticky;top:0;z-index:10;backdrop-filter:saturate(120%) blur(6px);background:linear-gradient(180deg,rgba(2,8,23,.55),rgba(2,8,23,.15));border-bottom:1px solid rgba(148,163,184,.15)}
    .bar{max-width:900px;margin:0 auto;padding:14px 18px;display:flex;align-items:center;justify-content:space-between}
    .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px} .brand a{color:var(--text)}
    .logo{width:32px;height:32px;border-radius:10px;background:conic-gradient(from 180deg,var(--brand),var(--brand-2),var(--accent),var(--brand))}
    .btn{border:1px solid #94a3b83f;background:var(--glass);color:var(--text);padding:10px 14px;border-radius:12px;cursor:pointer;font:600 14px/1 Inter,sans-serif;transition:transform var(--speed-1)} .btn:hover{transform:translateY(-2px)}
    main{max-width:900px;margin:32px auto;padding:0 18px}
    h1{font-weight:800;font-size:clamp(26px,4vw,34px);margin:0 0 8px} .subtitle{color:var(--muted);font-size:15px;margin-bottom:28px}
    .card{background:var(--panel);border-radius:16px;padding:24px;border:1px solid #94a3b82f;margin-bottom:20px}
    .tabs{display:flex;gap:8px;margin-bottom:20px} .tab{padding:10px 16px;border-radius:10px;border:1px solid #94a3b83f;background:var(--glass);color:var(--muted);cursor:pointer;font-weight:600} .tab.active{color:var(--text);border-color:var(--brand);background:rgba(14,165,233,.12)}
    .panel{display:none} .panel.visible{display:block}
    label{display:block;font-size:14px;font-weight:600;color:var(--muted);margin-bottom:8px}
    textarea{width:100%;min-height:140px;padding:14px;border-radius:12px;border:1px solid #94a3b83f;background:#0c1222;color:var(--text);font:14px JetBrains Mono,monospace;resize:vertical}
    .toolbar{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px}
    .err{color:#f87171;font-size:14px} footer{padding:24px 18px;color:var(--muted);text-align:center;border-top:1px solid #94a3b826}
  </style>
</head>
<body>
  <div class="app">
    <header><div class="bar"><div class="brand"><a href="index.html"><span class="logo" aria-hidden="true"></span>CODELYFE</a></div><a class="btn" href="index.html">Home</a></div></header>
    <main>
      <h1>HTML Entities</h1>
      <p class="subtitle">Encode special characters to HTML entities or decode entities back to text.</p>
      <div class="card">
        <div class="tabs">
          <button type="button" class="tab active" data-tab="enc">Encode</button>
          <button type="button" class="tab" data-tab="dec">Decode</button>
        </div>
        <div id="panelEnc" class="panel visible">
          <label for="encIn">Text (e.g. &lt; &amp; &quot;)</label>
          <div class="toolbar"><button type="button" class="btn" id="encBtn">Encode</button><button type="button" class="btn" id="copyEnc">Copy</button></div>
          <textarea id="encIn" placeholder="Paste text to encode…"></textarea>
        </div>
        <div id="panelDec" class="panel">
          <label for="decIn">HTML entities (e.g. &amp;lt; &amp;amp;)</label>
          <div class="toolbar"><button type="button" class="btn" id="decBtn">Decode</button><button type="button" class="btn" id="copyDec">Copy</button></div>
          <textarea id="decIn" placeholder="Paste entities to decode…"></textarea>
        </div>
        <p class="err" id="err"></p>
      </div>
    </main>
    <footer><a href="index.html">Codelyfe</a> — HTML entities</footer>
  </div>
  <script>
(function(){
  var tabToPanel = { enc: "panelEnc", dec: "panelDec" };
  document.querySelectorAll(".tab").forEach(function(t){
    t.addEventListener("click", function(){
      document.querySelectorAll(".tab").forEach(function(x){ x.classList.remove("active"); });
      document.querySelectorAll("[id^=panel]").forEach(function(p){ p.classList.remove("visible"); });
      t.classList.add("active");
      var p = document.getElementById(tabToPanel[t.getAttribute("data-tab")]);
      if (p) p.classList.add("visible");
    });
  });
  var enc = { "<": "&lt;", ">": "&gt;", "&": "&amp;", '"': "&quot;", "'": "&#39;" };
  function encodeHtml(s){ return String(s).replace(/[<>&"']/g, function(c){ return enc[c] || c; }); }
  function decodeHtml(s){
    var t = document.createElement("textarea"); t.innerHTML = s; return t.value;
  }
  document.getElementById("encBtn").addEventListener("click", function(){ var ta = document.getElementById("encIn"); ta.value = encodeHtml(ta.value); });
  document.getElementById("copyEnc").addEventListener("click", function(){ navigator.clipboard.writeText(document.getElementById("encIn").value); });
  document.getElementById("decBtn").addEventListener("click", function(){ var ta = document.getElementById("decIn"); ta.value = decodeHtml(ta.value); });
  document.getElementById("copyDec").addEventListener("click", function(){ navigator.clipboard.writeText(document.getElementById("decIn").value); });
})();
  </script>
</body>
</html>
