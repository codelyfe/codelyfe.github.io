<!doctype html>
<html lang="en">
<!-- Randal C. Burger Jr -->
<head>
  <meta charset="utf-8" />
  <title>ZIP Creator — Codelyfe</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <meta name="theme-color" content="#0ea5e9" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    :root{--panel:#0f172a;--text:#e5f0ff;--muted:#9db3d1;--brand:#0ea5e9;--brand-2:#14b8a6;--accent:#a78bfa;--ring:0 0 0 3px color-mix(in srgb, var(--brand) 35%, transparent);--glass:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.03));--speed-1:300ms}
    @media (prefers-color-scheme: light){:root{--bg:#f7fbff;--panel:#fff;--text:#0b1220;--muted:#44566c;--glass:linear-gradient(180deg,#fff,#fff7)}}
    *{box-sizing:border-box} html,body{min-height:100%;margin:0}
    body{font:16px/1.55 Inter,system-ui,sans-serif;color:var(--text);background:radial-gradient(1200px 600px at 80% -20%,rgba(78,205,255,.22),transparent 60%),radial-gradient(1000px 600px at -10% -10%,rgba(167,139,250,.22),transparent 55%),var(--bg);overflow-x:hidden}
    a{color:var(--brand);text-decoration:none} a:focus-visible,button:focus-visible,input:focus-visible{outline:none;box-shadow:var(--ring)}
    .app{min-height:100%;display:grid;grid-template-rows:auto 1fr auto}
    header{position:sticky;top:0;z-index:10;backdrop-filter:saturate(120%) blur(6px);background:linear-gradient(180deg,rgba(2,8,23,.55),rgba(2,8,23,.15));border-bottom:1px solid rgba(148,163,184,.15)}
    .bar{max-width:900px;margin:0 auto;padding:14px 18px;display:flex;align-items:center;justify-content:space-between}
    .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px} .brand a{color:var(--text)}
    .logo{width:32px;height:32px;border-radius:10px;background:conic-gradient(from 180deg,var(--brand),var(--brand-2),var(--accent),var(--brand))}
    .btn{border:1px solid #94a3b83f;background:var(--glass);color:var(--text);padding:10px 14px;border-radius:12px;cursor:pointer;font:600 14px/1 Inter,sans-serif;transition:transform var(--speed-1)} .btn:hover{transform:translateY(-2px)} .btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
    main{max-width:700px;margin:32px auto;padding:0 18px}
    h1{font-weight:800;font-size:clamp(26px,4vw,34px);margin:0 0 8px} .subtitle{color:var(--muted);font-size:15px;margin-bottom:28px}
    .card{background:var(--panel);border-radius:16px;padding:24px;border:1px solid #94a3b82f;margin-bottom:20px}
    .drop-zone{border:2px dashed #94a3b85c;border-radius:14px;padding:32px;text-align:center;cursor:pointer;background:rgba(255,255,255,.03)} .drop-zone:hover,.drop-zone.dragover{border-color:var(--brand);background:rgba(14,165,233,.08)} .drop-zone input{display:none} .drop-zone p{margin:0;color:var(--muted)} .drop-zone p strong{color:var(--text)}
    .file-list{margin-top:14px;max-height:200px;overflow:auto;padding:12px;border-radius:12px;background:rgba(0,0,0,.2);font-size:14px}
    .file-list div{padding:4px 0;color:var(--muted)} .file-list div strong{color:var(--text)}
    .row{margin-top:16px;display:flex;flex-wrap:wrap;gap:12px;align-items:center}
    input[type="text"]{padding:10px 14px;border-radius:12px;border:1px solid #94a3b83f;background:var(--panel);color:var(--text);font:14px Inter,sans-serif;width:220px}
    .err{color:#f87171;font-size:14px;margin-top:10px} footer{padding:24px 18px;color:var(--muted);text-align:center;border-top:1px solid #94a3b826}
  </style>
</head>
<body>
  <div class="app">
    <header><div class="bar"><div class="brand"><a href="index.html"><span class="logo" aria-hidden="true"></span>CODELYFE</a></div><a class="btn" href="index.html">Home</a></div></header>
    <main>
      <h1>ZIP Creator</h1>
      <p class="subtitle">Add multiple files and download them as one ZIP archive. All in your browser.</p>
      <div class="card">
        <div class="drop-zone" id="dropZone"><input type="file" id="fileIn" multiple /><p><strong>Choose files</strong> or drag them here</p></div>
        <div class="file-list" id="fileList"></div>
        <div class="row">
          <label for="zipName">ZIP filename:</label>
          <input type="text" id="zipName" value="archive.zip" placeholder="archive.zip" />
          <button type="button" class="btn" id="createBtn" disabled>Create ZIP</button>
        </div>
        <p class="err" id="err"></p>
      </div>
    </main>
    <footer><a href="index.html">Codelyfe</a> — ZIP creator</footer>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script>
(function(){
  var files = [];
  var dropZone = document.getElementById("dropZone");
  var fileIn = document.getElementById("fileIn");
  var fileListEl = document.getElementById("fileList");
  var createBtn = document.getElementById("createBtn");
  var err = document.getElementById("err");
  function formatBytes(n){ if (n < 1024) return n + " B"; if (n < 1024*1024) return (n/1024).toFixed(1) + " KB"; return (n/(1024*1024)).toFixed(1) + " MB"; }
  function updateList(){
    fileListEl.innerHTML = files.length ? files.map(function(f){ return "<div><strong>" + f.name + "</strong> " + formatBytes(f.size) + "</div>"; }).join("") : "<div style=\"color:var(--muted)\">No files added.</div>";
    createBtn.disabled = files.length === 0;
  }
  function addFiles(list){ for (var i = 0; i < list.length; i++) files.push(list[i]); updateList(); }
  dropZone.addEventListener("click", function(){ fileIn.click(); });
  dropZone.addEventListener("dragover", function(e){ e.preventDefault(); dropZone.classList.add("dragover"); });
  dropZone.addEventListener("dragleave", function(){ dropZone.classList.remove("dragover"); });
  dropZone.addEventListener("drop", function(e){ e.preventDefault(); dropZone.classList.remove("dragover"); if (e.dataTransfer.files.length) addFiles(e.dataTransfer.files); });
  fileIn.addEventListener("change", function(){ if (this.files.length) addFiles(this.files); this.value = ""; });
  createBtn.addEventListener("click", function(){
    if (!files.length || typeof JSZip === "undefined") return;
    err.textContent = "";
    createBtn.disabled = true;
    var zip = new JSZip();
    var done = 0;
    function next(){
      if (done >= files.length) {
        zip.generateAsync({ type: "blob" }).then(function(blob){
          var a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = document.getElementById("zipName").value || "archive.zip"; a.click(); URL.revokeObjectURL(a.href);
          createBtn.disabled = false;
        }).catch(function(e){ err.textContent = e.message; createBtn.disabled = false; });
        return;
      }
      var f = files[done];
      var reader = new FileReader();
      reader.onload = function(){
        zip.file(f.name, reader.result);
        done++;
        next();
      };
      reader.readAsArrayBuffer(f);
    }
    next();
  });
  updateList();
})();
  </script>
</body>
</html>
