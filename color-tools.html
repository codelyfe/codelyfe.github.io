<!doctype html>
<html lang="en">
<!-- Randal C. Burger Jr -->
<head>
  <meta charset="utf-8" />
  <title>Color & Contrast — Codelyfe</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <meta name="theme-color" content="#0ea5e9" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    :root{--panel:#0f172a;--text:#e5f0ff;--muted:#9db3d1;--brand:#0ea5e9;--brand-2:#14b8a6;--accent:#a78bfa;--ring:0 0 0 3px color-mix(in srgb, var(--brand) 35%, transparent);--glass:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.03));--speed-1:300ms}
    @media (prefers-color-scheme: light){:root{--bg:#f7fbff;--panel:#fff;--text:#0b1220;--muted:#44566c;--glass:linear-gradient(180deg,#fff,#fff7)}}
    *{box-sizing:border-box} html,body{min-height:100%;margin:0}
    body{font:16px/1.55 Inter,system-ui,sans-serif;color:var(--text);background:radial-gradient(1200px 600px at 80% -20%,rgba(78,205,255,.22),transparent 60%),radial-gradient(1000px 600px at -10% -10%,rgba(167,139,250,.22),transparent 55%),var(--bg);overflow-x:hidden}
    a{color:var(--brand);text-decoration:none} a:focus-visible,button:focus-visible,input:focus-visible{outline:none;box-shadow:var(--ring)}
    .app{min-height:100%;display:grid;grid-template-rows:auto 1fr auto}
    header{position:sticky;top:0;z-index:10;backdrop-filter:saturate(120%) blur(6px);background:linear-gradient(180deg,rgba(2,8,23,.55),rgba(2,8,23,.15));border-bottom:1px solid rgba(148,163,184,.15)}
    .bar{max-width:900px;margin:0 auto;padding:14px 18px;display:flex;align-items:center;justify-content:space-between}
    .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px} .brand a{color:var(--text)}
    .logo{width:32px;height:32px;border-radius:10px;background:conic-gradient(from 180deg,var(--brand),var(--brand-2),var(--accent),var(--brand))}
    .btn{border:1px solid #94a3b83f;background:var(--glass);color:var(--text);padding:10px 14px;border-radius:12px;cursor:pointer;font:600 14px/1 Inter,sans-serif;transition:transform var(--speed-1)} .btn:hover{transform:translateY(-2px)}
    main{max-width:900px;margin:32px auto;padding:0 18px}
    h1{font-weight:800;font-size:clamp(26px,4vw,34px);margin:0 0 8px} .subtitle{color:var(--muted);font-size:15px;margin-bottom:28px}
    .card{background:var(--panel);border-radius:16px;padding:24px;border:1px solid #94a3b82f;margin-bottom:20px}
    .tabs{display:flex;gap:8px;margin-bottom:20px} .tab{padding:10px 16px;border-radius:10px;border:1px solid #94a3b83f;background:var(--glass);color:var(--muted);cursor:pointer;font-weight:600} .tab.active{color:var(--text);border-color:var(--brand);background:rgba(14,165,233,.12)}
    .panel{display:none} .panel.visible{display:block}
    label{display:block;font-size:14px;font-weight:600;color:var(--muted);margin-bottom:8px}
    input[type="color"]{width:56px;height:40px;padding:2px;border-radius:10px;border:1px solid #94a3b83f;cursor:pointer;background:0}
    input[type="text"]{padding:10px 12px;border-radius:10px;border:1px solid #94a3b83f;background:var(--panel);color:var(--text);font:14px Inter,sans-serif;width:120px}
    .contrast-row{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:16px}
    .swatch{width:80px;height:56px;border-radius:12px;border:1px solid #94a3b83f}
    .ratio{font-weight:700;font-size:18px;margin:12px 0} .pass{color:var(--brand-2)} .fail{color:#f87171}
    .palette{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:12px;margin-top:16px}
    .palette-swatch{height:80px;border-radius:12px;border:1px solid #94a3b83f;display:flex;align-items:flex-end;padding:8px;font-size:11px;font-weight:600;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.5)}
    .toolbar{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px}
    footer{padding:24px 18px;color:var(--muted);text-align:center;border-top:1px solid #94a3b826}
  </style>
</head>
<body>
  <div class="app">
    <header><div class="bar"><div class="brand"><a href="index.html"><span class="logo" aria-hidden="true"></span>CODELYFE</a></div><a class="btn" href="index.html">Home</a></div></header>
    <main>
      <h1>Color Palette & Contrast</h1>
      <p class="subtitle">Generate palettes and check WCAG contrast ratios for accessibility.</p>
      <div class="card">
        <div class="tabs">
          <button type="button" class="tab active" data-tab="contrast">Contrast checker</button>
          <button type="button" class="tab" data-tab="palette">Palette generator</button>
        </div>
        <div id="panelContrast" class="panel visible">
          <label>Foreground & background</label>
          <div class="contrast-row">
            <div><input type="color" id="fgColor" value="#000000" /><br><input type="text" id="fgHex" value="#000000" /></div>
            <div><input type="color" id="bgColor" value="#ffffff" /><input type="text" id="bgHex" value="#ffffff" /></div>
          </div>
          <div class="ratio" id="ratioOut">Ratio: —</div>
          <p id="wcagOut"></p>
        </div>
        <div id="panelPalette" class="panel">
          <label>Generate a palette (5 colors)</label>
          <div class="toolbar">
            <button type="button" class="btn" id="paletteHue">From hue</button>
            <button type="button" class="btn" id="paletteRand">Random</button>
          </div>
          <label for="hueIn">Hue (0–360) for first color</label>
          <input type="number" id="hueIn" min="0" max="360" value="200" style="width:80px;padding:10px;border-radius:10px;border:1px solid #94a3b83f;background:var(--panel);color:var(--text)" />
          <div class="palette" id="paletteOut"></div>
        </div>
      </div>
    </main>
    <footer><a href="index.html">Codelyfe</a> — Color tools</footer>
  </div>
  <script>
(function(){
  var tabToPanel = { contrast: "panelContrast", palette: "panelPalette" };
  document.querySelectorAll(".tab").forEach(function(t){
    t.addEventListener("click", function(){
      document.querySelectorAll(".tab").forEach(function(x){ x.classList.remove("active"); });
      document.querySelectorAll("[id^=panel]").forEach(function(p){ p.classList.remove("visible"); });
      t.classList.add("active");
      var p = document.getElementById(tabToPanel[t.getAttribute("data-tab")]);
      if (p) p.classList.add("visible");
    });
  });
  function hexToRgb(hex){
    var m = hex.replace(/^#/,"").match(/.{2}/g);
    if (!m || m.length !== 3) return null;
    return { r: parseInt(m[0],16)/255, g: parseInt(m[1],16)/255, b: parseInt(m[2],16)/255 };
  }
  function luminance(r,g,b){
    var [rs,gs,bs] = [r,g,b].map(function(c){ return c <= 0.03928 ? c/12.92 : Math.pow((c+0.055)/1.055, 2.4); });
    return 0.2126*rs + 0.7152*gs + 0.0722*bs;
  }
  function contrastRatio(l1, l2){ var L = Math.max(l1,l2), l = Math.min(l1,l2); return (L + 0.05) / (l + 0.05); }
  function updateContrast(){
    var fg = hexToRgb(document.getElementById("fgHex").value);
    var bg = hexToRgb(document.getElementById("bgHex").value);
    if (!fg || !bg) return;
    var Lfg = luminance(fg.r, fg.g, fg.b);
    var Lbg = luminance(bg.r, bg.g, bg.b);
    var ratio = Math.round(contrastRatio(Lfg, Lbg) * 100) / 100;
    document.getElementById("ratioOut").textContent = "Ratio: " + ratio + ":1";
    var aa = ratio >= 4.5, aaLarge = ratio >= 3, aaa = ratio >= 7, aaaLarge = ratio >= 4.5;
    var html = "WCAG 2.1: ";
    html += "AA " + (aa ? "✓" : "✗") + " (4.5:1) · AA large " + (aaLarge ? "✓" : "✗") + " (3:1) · ";
    html += "AAA " + (aaa ? "✓" : "✗") + " (7:1) · AAA large " + (aaaLarge ? "✓" : "✗") + " (4.5:1)";
    var out = document.getElementById("wcagOut");
    out.innerHTML = html;
    out.className = (aa || aaLarge) ? "pass" : "fail";
  }
  document.getElementById("fgColor").addEventListener("input", function(){ document.getElementById("fgHex").value = this.value; updateContrast(); });
  document.getElementById("bgColor").addEventListener("input", function(){ document.getElementById("bgHex").value = this.value; updateContrast(); });
  document.getElementById("fgHex").addEventListener("input", function(){ var v = this.value; if (/^#[0-9A-Fa-f]{6}$/.test(v)) document.getElementById("fgColor").value = v; updateContrast(); });
  document.getElementById("bgHex").addEventListener("input", function(){ var v = this.value; if (/^#[0-9A-Fa-f]{6}$/.test(v)) document.getElementById("bgColor").value = v; updateContrast(); });
  updateContrast();
  function hslToHex(h,s,l){
    s/=100; l/=100;
    var c = (1-Math.abs(2*l-1))*s, x = c*(1-Math.abs((h/60)%2-1)), m = l-c/2;
    var r=0,g=0,b=0;
    if (h<60) { r=c; g=x; } else if (h<120) { r=x; g=c; } else if (h<180) { g=c; b=x; } else if (h<240) { g=x; b=c; } else if (h<300) { r=x; b=c; } else { r=c; b=x; }
    return "#" + [r+m,g+m,b+m].map(function(v){ return ("0"+Math.round(v*255).toString(16)).slice(-2); }).join("");
  }
  function renderPalette(colors){
    var el = document.getElementById("paletteOut");
    el.innerHTML = colors.map(function(hex){
      return "<div class=\"palette-swatch\" style=\"background:" + hex + "\" title=\"" + hex + "\">" + hex + "</div>";
    }).join("");
  }
  document.getElementById("paletteHue").addEventListener("click", function(){
    var hue = parseInt(document.getElementById("hueIn").value, 10) || 0;
    var colors = [];
    for (var i = 0; i < 5; i++) colors.push(hslToHex((hue + i * 72) % 360, 70, 50));
    renderPalette(colors);
  });
  document.getElementById("paletteRand").addEventListener("click", function(){
    var colors = [];
    for (var i = 0; i < 5; i++) colors.push(hslToHex(Math.floor(Math.random()*360), 60 + Math.random()*25, 40 + Math.random()*30));
    renderPalette(colors);
  });
})();
  </script>
</body>
</html>
