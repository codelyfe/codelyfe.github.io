<!doctype html>
<html lang="en">
<!-- Randal C. Burger Jr -->
<head>
  <meta charset="utf-8" />
  <title>Password Generator — Codelyfe</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <meta name="theme-color" content="#0ea5e9" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    :root{--panel:#0f172a;--text:#e5f0ff;--muted:#9db3d1;--brand:#0ea5e9;--brand-2:#14b8a6;--accent:#a78bfa;--ring:0 0 0 3px color-mix(in srgb, var(--brand) 35%, transparent);--glass:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.03));--speed-1:300ms}
    @media (prefers-color-scheme: light){:root{--bg:#f7fbff;--panel:#fff;--text:#0b1220;--muted:#44566c;--glass:linear-gradient(180deg,#fff,#fff7)}}
    *{box-sizing:border-box} html,body{min-height:100%;margin:0}
    body{font:16px/1.55 Inter,system-ui,sans-serif;color:var(--text);background:radial-gradient(1200px 600px at 80% -20%,rgba(78,205,255,.22),transparent 60%),radial-gradient(1000px 600px at -10% -10%,rgba(167,139,250,.22),transparent 55%),var(--bg);overflow-x:hidden}
    a{color:var(--brand);text-decoration:none} a:focus-visible,button:focus-visible,input:focus-visible{outline:none;box-shadow:var(--ring)}
    .app{min-height:100%;display:grid;grid-template-rows:auto 1fr auto}
    header{position:sticky;top:0;z-index:10;backdrop-filter:saturate(120%) blur(6px);background:linear-gradient(180deg,rgba(2,8,23,.55),rgba(2,8,23,.15));border-bottom:1px solid rgba(148,163,184,.15)}
    .bar{max-width:900px;margin:0 auto;padding:14px 18px;display:flex;align-items:center;justify-content:space-between}
    .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px} .brand a{color:var(--text)}
    .logo{width:32px;height:32px;border-radius:10px;background:conic-gradient(from 180deg,var(--brand),var(--brand-2),var(--accent),var(--brand))}
    .btn{border:1px solid #94a3b83f;background:var(--glass);color:var(--text);padding:10px 14px;border-radius:12px;cursor:pointer;font:600 14px/1 Inter,sans-serif;transition:transform var(--speed-1)} .btn:hover{transform:translateY(-2px)}
    main{max-width:900px;margin:32px auto;padding:0 18px}
    h1{font-weight:800;font-size:clamp(26px,4vw,34px);margin:0 0 8px} .subtitle{color:var(--muted);font-size:15px;margin-bottom:28px}
    .card{background:var(--panel);border-radius:16px;padding:24px;border:1px solid #94a3b82f;margin-bottom:20px}
    label{display:block;font-size:14px;font-weight:600;color:var(--muted);margin-bottom:8px}
    .pass-out{width:100%;max-width:480px;padding:14px 16px;border-radius:12px;border:1px solid #94a3b83f;background:#0c1222;color:var(--text);font:18px JetBrains Mono,ui-monospace,monospace;letter-spacing:.1em;margin-bottom:12px}
    .opts{display:flex;flex-wrap:wrap;gap:16px 24px;margin:16px 0;align-items:center}
    .opts label{display:flex;align-items:center;gap:8px;margin:0;font-weight:400;cursor:pointer}
    .opts input[type="checkbox"]{width:18px;height:18px}
    .len-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
    .len-row input[type="number"]{width:70px;padding:10px;border-radius:10px;border:1px solid #94a3b83f;background:var(--panel);color:var(--text);font-size:16px}
    .strength{display:flex;align-items:center;gap:10px;margin-top:12px;flex-wrap:wrap}
    .strength-bar{height:8px;border-radius:999px;background:rgba(255,255,255,.15);flex:1;max-width:200px;overflow:hidden;display:flex}
    .strength-fill{height:100%;border-radius:999px;transition:width .2s,background .2s;width:0%}
    .strength-0{background:#64748b} .strength-1{background:#ef4444} .strength-2{background:#f59e0b} .strength-3{background:#eab308} .strength-4{background:#22c55e}
    .toolbar{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px}
    footer{padding:24px 18px;color:var(--muted);text-align:center;border-top:1px solid #94a3b826}
  </style>
</head>
<body>
  <div class="app">
    <header><div class="bar"><div class="brand"><a href="index.html"><span class="logo" aria-hidden="true"></span>CODELYFE</a></div><a class="btn" href="index.html">Home</a></div></header>
    <main>
      <h1>Password Generator</h1>
      <p class="subtitle">Generate secure passwords with crypto.getRandomValues. Nothing is sent anywhere — all in your browser.</p>
      <div class="card">
        <label for="passOut">Password</label>
        <input type="text" id="passOut" class="pass-out" readonly placeholder="Click Generate" />
        <div class="toolbar">
          <button type="button" class="btn" id="genBtn">Generate</button>
          <button type="button" class="btn" id="copyBtn">Copy</button>
        </div>
        <label class="len-row" style="margin-top:20px">Length: <input type="number" id="lenIn" min="8" max="64" value="16" /></label>
        <div class="opts">
          <label><input type="checkbox" id="optUpper" checked /> Uppercase</label>
          <label><input type="checkbox" id="optLower" checked /> Lowercase</label>
          <label><input type="checkbox" id="optNum" checked /> Numbers</label>
          <label><input type="checkbox" id="optSym" checked /> Symbols</label>
        </div>
        <div class="strength">
          <span class="muted" style="font-size:14px;color:var(--muted)">Strength:</span>
          <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
          <span id="strengthText" style="font-size:14px">—</span>
        </div>
      </div>
    </main>
    <footer><a href="index.html">Codelyfe</a> — Password generator</footer>
  </div>
  <script>
(function(){
  var passOut = document.getElementById("passOut");
  var lenIn = document.getElementById("lenIn");
  var strengthFill = document.getElementById("strengthFill");
  var strengthText = document.getElementById("strengthText");
  var U = "ABCDEFGHIJKLMNOPQRSTUVWXYZ", L = "abcdefghijklmnopqrstuvwxyz", N = "0123456789", S = "!@#$%^&*()_+-=[]{}|;:,.<>?";
  function getChars(){
    var s = "";
    if (document.getElementById("optUpper").checked) s += U;
    if (document.getElementById("optLower").checked) s += L;
    if (document.getElementById("optNum").checked) s += N;
    if (document.getElementById("optSym").checked) s += S;
    return s || L;
  }
  function generate(){
    var len = Math.max(8, Math.min(64, parseInt(lenIn.value, 10) || 16));
    var chars = getChars();
    var arr = new Uint32Array(len);
    crypto.getRandomValues(arr);
    var out = "";
    for (var i = 0; i < len; i++) out += chars[arr[i] % chars.length];
    passOut.value = out;
    updateStrength(out);
  }
  function updateStrength(p){
    var score = 0;
    if (p.length >= 12) score++;
    if (p.length >= 16) score++;
    if (/[a-z]/.test(p) && /[A-Z]/.test(p)) score++;
    if (/\d/.test(p)) score++;
    if (/[^A-Za-z0-9]/.test(p)) score++;
    var labels = ["Very weak","Weak","Fair","Strong","Very strong"];
    strengthFill.className = "strength-fill strength-" + Math.min(4, score);
    strengthFill.style.width = (score * 25) + "%";
    strengthText.textContent = labels[Math.min(4, score)];
  }
  document.getElementById("genBtn").addEventListener("click", generate);
  document.getElementById("copyBtn").addEventListener("click", function(){
    if (!passOut.value) return;
    navigator.clipboard.writeText(passOut.value).then(function(){ strengthText.textContent = "Copied!"; setTimeout(function(){ updateStrength(passOut.value); }, 1500); });
  });
  passOut.addEventListener("input", function(){ updateStrength(passOut.value); });
  passOut.addEventListener("focus", function(){ this.select(); });
})();
  </script>
</body>
</html>
