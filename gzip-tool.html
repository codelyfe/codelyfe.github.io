<!doctype html>
<html lang="en">
<!-- Randal C. Burger Jr -->
<head>
  <meta charset="utf-8" />
  <title>Gzip Tool — Codelyfe</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <meta name="theme-color" content="#0ea5e9" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    :root{--panel:#0f172a;--text:#e5f0ff;--muted:#9db3d1;--brand:#0ea5e9;--brand-2:#14b8a6;--accent:#a78bfa;--ring:0 0 0 3px color-mix(in srgb, var(--brand) 35%, transparent);--glass:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.03));--speed-1:300ms}
    @media (prefers-color-scheme: light){:root{--bg:#f7fbff;--panel:#fff;--text:#0b1220;--muted:#44566c;--glass:linear-gradient(180deg,#fff,#fff7)}}
    *{box-sizing:border-box} html,body{min-height:100%;margin:0}
    body{font:16px/1.55 Inter,system-ui,sans-serif;color:var(--text);background:radial-gradient(1200px 600px at 80% -20%,rgba(78,205,255,.22),transparent 60%),radial-gradient(1000px 600px at -10% -10%,rgba(167,139,250,.22),transparent 55%),var(--bg);overflow-x:hidden}
    a{color:var(--brand);text-decoration:none} a:focus-visible,button:focus-visible,input:focus-visible{outline:none;box-shadow:var(--ring)}
    .app{min-height:100%;display:grid;grid-template-rows:auto 1fr auto}
    header{position:sticky;top:0;z-index:10;backdrop-filter:saturate(120%) blur(6px);background:linear-gradient(180deg,rgba(2,8,23,.55),rgba(2,8,23,.15));border-bottom:1px solid rgba(148,163,184,.15)}
    .bar{max-width:900px;margin:0 auto;padding:14px 18px;display:flex;align-items:center;justify-content:space-between}
    .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px} .brand a{color:var(--text)}
    .logo{width:32px;height:32px;border-radius:10px;background:conic-gradient(from 180deg,var(--brand),var(--brand-2),var(--accent),var(--brand))}
    .btn{border:1px solid #94a3b83f;background:var(--glass);color:var(--text);padding:10px 14px;border-radius:12px;cursor:pointer;font:600 14px/1 Inter,sans-serif;transition:transform var(--speed-1)} .btn:hover{transform:translateY(-2px)} .btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
    main{max-width:700px;margin:32px auto;padding:0 18px}
    h1{font-weight:800;font-size:clamp(26px,4vw,34px);margin:0 0 8px} .subtitle{color:var(--muted);font-size:15px;margin-bottom:28px}
    .card{background:var(--panel);border-radius:16px;padding:24px;border:1px solid #94a3b82f;margin-bottom:20px}
    .tabs{display:flex;gap:8px;margin-bottom:20px} .tab{padding:10px 16px;border-radius:10px;border:1px solid #94a3b83f;background:var(--glass);color:var(--muted);cursor:pointer;font-weight:600} .tab.active{color:var(--text);border-color:var(--brand);background:rgba(14,165,233,.12)}
    .panel{display:none} .panel.visible{display:block}
    .drop-zone{border:2px dashed #94a3b85c;border-radius:14px;padding:28px;text-align:center;cursor:pointer;background:rgba(255,255,255,.03)} .drop-zone:hover,.drop-zone.dragover{border-color:var(--brand)} .drop-zone input{display:none} .drop-zone p{margin:0;color:var(--muted)}
    .err{color:#f87171;font-size:14px;margin-top:10px} footer{padding:24px 18px;color:var(--muted);text-align:center;border-top:1px solid #94a3b826}
  </style>
</head>
<body>
  <div class="app">
    <header><div class="bar"><div class="brand"><a href="index.html"><span class="logo" aria-hidden="true"></span>CODELYFE</a></div><a class="btn" href="index.html">Home</a></div></header>
    <main>
      <h1>Gzip Tool</h1>
      <p class="subtitle">Compress any file to .gz or decompress a .gz file. Uses fflate — all in the browser.</p>
      <div class="card">
        <div class="tabs">
          <button type="button" class="tab active" data-tab="compress">Compress to .gz</button>
          <button type="button" class="tab" data-tab="decompress">Decompress .gz</button>
        </div>
        <div id="panelCompress" class="panel visible">
          <div class="drop-zone" id="czDrop"><input type="file" id="czFile" /><p><strong>Choose a file</strong> to compress to .gz</p></div>
          <button type="button" class="btn" id="czBtn" style="margin-top:12px" disabled>Compress & download</button>
        </div>
        <div id="panelDecompress" class="panel">
          <div class="drop-zone" id="dzDrop"><input type="file" id="dzFile" accept=".gz,application/gzip" /><p><strong>Choose a .gz file</strong> to decompress</p></div>
          <button type="button" class="btn" id="dzBtn" style="margin-top:12px" disabled>Decompress & download</button>
        </div>
        <p class="err" id="err"></p>
      </div>
    </main>
    <footer><a href="index.html">Codelyfe</a> — Gzip tool</footer>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/fflate@0.8.2/umd/index.min.js"></script>
  <script>
(function(){
  var tabToPanel = { compress: "panelCompress", decompress: "panelDecompress" };
  document.querySelectorAll(".tab").forEach(function(t){
    t.addEventListener("click", function(){
      document.querySelectorAll(".tab").forEach(function(x){ x.classList.remove("active"); });
      document.querySelectorAll("[id^=panel]").forEach(function(p){ p.classList.remove("visible"); });
      t.classList.add("active");
      var p = document.getElementById(tabToPanel[t.getAttribute("data-tab")]);
      if (p) p.classList.add("visible");
    });
  });
  var czFile = null, dzFile = null;
  var err = document.getElementById("err");
  document.getElementById("czDrop").addEventListener("click", function(){ document.getElementById("czFile").click(); });
  document.getElementById("czDrop").addEventListener("dragover", function(e){ e.preventDefault(); this.classList.add("dragover"); });
  document.getElementById("czDrop").addEventListener("dragleave", function(){ this.classList.remove("dragover"); });
  document.getElementById("czDrop").addEventListener("drop", function(e){ e.preventDefault(); this.classList.remove("dragover"); if (e.dataTransfer.files[0]) { czFile = e.dataTransfer.files[0]; document.getElementById("czBtn").disabled = false; } });
  document.getElementById("czFile").addEventListener("change", function(){ if (this.files[0]) { czFile = this.files[0]; document.getElementById("czBtn").disabled = false; } });
  document.getElementById("dzDrop").addEventListener("click", function(){ document.getElementById("dzFile").click(); });
  document.getElementById("dzDrop").addEventListener("dragover", function(e){ e.preventDefault(); this.classList.add("dragover"); });
  document.getElementById("dzDrop").addEventListener("dragleave", function(){ this.classList.remove("dragover"); });
  document.getElementById("dzDrop").addEventListener("drop", function(e){ e.preventDefault(); this.classList.remove("dragover"); if (e.dataTransfer.files[0]) { dzFile = e.dataTransfer.files[0]; document.getElementById("dzBtn").disabled = false; } });
  document.getElementById("dzFile").addEventListener("change", function(){ if (this.files[0]) { dzFile = this.files[0]; document.getElementById("dzBtn").disabled = false; } });
  document.getElementById("czBtn").addEventListener("click", function(){
    if (!czFile || typeof fflate === "undefined") return;
    err.textContent = "";
    var reader = new FileReader();
    reader.onload = function(){
      try {
        var compressed = fflate.gzipSync(new Uint8Array(reader.result));
        var blob = new Blob([compressed], { type: "application/gzip" });
        var a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = czFile.name + ".gz"; a.click(); URL.revokeObjectURL(a.href);
      } catch(e) { err.textContent = e.message; }
    };
    reader.readAsArrayBuffer(czFile);
  });
  document.getElementById("dzBtn").addEventListener("click", function(){
    if (!dzFile || typeof fflate === "undefined") return;
    err.textContent = "";
    var reader = new FileReader();
    reader.onload = function(){
      try {
        var decompressed = fflate.gunzipSync(new Uint8Array(reader.result));
        var blob = new Blob([decompressed]);
        var name = dzFile.name.replace(/\.gz$/i, "") || "decompressed";
        var a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = name; a.click(); URL.revokeObjectURL(a.href);
      } catch(e) { err.textContent = e.message; }
    };
    reader.readAsArrayBuffer(dzFile);
  });
})();
  </script>
</body>
</html>
