<!doctype html>
<html lang="en">
<!-- Randal C. Burger Jr -->
<head>
  <meta charset="utf-8" />
  <title>JWT Decoder — Codelyfe</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <meta name="theme-color" content="#0ea5e9" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    :root{--panel:#0f172a;--text:#e5f0ff;--muted:#9db3d1;--brand:#0ea5e9;--brand-2:#14b8a6;--accent:#a78bfa;--ring:0 0 0 3px color-mix(in srgb, var(--brand) 35%, transparent);--glass:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.03));--speed-1:300ms}
    @media (prefers-color-scheme: light){:root{--bg:#f7fbff;--panel:#fff;--text:#0b1220;--muted:#44566c;--glass:linear-gradient(180deg,#fff,#fff7)}}
    *{box-sizing:border-box} html,body{min-height:100%;margin:0}
    body{font:16px/1.55 Inter,system-ui,sans-serif;color:var(--text);background:radial-gradient(1200px 600px at 80% -20%,rgba(78,205,255,.22),transparent 60%),radial-gradient(1000px 600px at -10% -10%,rgba(167,139,250,.22),transparent 55%),var(--bg);overflow-x:hidden}
    a{color:var(--brand);text-decoration:none} a:focus-visible,button:focus-visible,input:focus-visible,textarea:focus-visible{outline:none;box-shadow:var(--ring)}
    .app{min-height:100%;display:grid;grid-template-rows:auto 1fr auto}
    header{position:sticky;top:0;z-index:10;backdrop-filter:saturate(120%) blur(6px);background:linear-gradient(180deg,rgba(2,8,23,.55),rgba(2,8,23,.15));border-bottom:1px solid rgba(148,163,184,.15)}
    .bar{max-width:900px;margin:0 auto;padding:14px 18px;display:flex;align-items:center;justify-content:space-between}
    .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px} .brand a{color:var(--text)}
    .logo{width:32px;height:32px;border-radius:10px;background:conic-gradient(from 180deg,var(--brand),var(--brand-2),var(--accent),var(--brand))}
    .btn{border:1px solid #94a3b83f;background:var(--glass);color:var(--text);padding:10px 14px;border-radius:12px;cursor:pointer;font:600 14px/1 Inter,sans-serif;transition:transform var(--speed-1)} .btn:hover{transform:translateY(-2px)}
    main{max-width:900px;margin:32px auto;padding:0 18px}
    h1{font-weight:800;font-size:clamp(26px,4vw,34px);margin:0 0 8px} .subtitle{color:var(--muted);font-size:15px;margin-bottom:28px}
    .card{background:var(--panel);border-radius:16px;padding:24px;border:1px solid #94a3b82f;margin-bottom:20px}
    label{display:block;font-size:14px;font-weight:600;color:var(--muted);margin-bottom:8px}
    textarea{width:100%;min-height:100px;padding:14px;border-radius:12px;border:1px solid #94a3b83f;background:#0c1222;color:var(--text);font:13px JetBrains Mono,monospace;resize:vertical}
    .jwt-section{margin-top:20px;padding:14px;border-radius:12px;border:1px solid #94a3b83f;background:#0c1222}
    .jwt-section h3{font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:0 0 8px}
    .jwt-section pre{margin:0;font:13px JetBrains Mono,monospace;white-space:pre-wrap;word-break:break-all}
    .err{color:#f87171;font-size:14px} footer{padding:24px 18px;color:var(--muted);text-align:center;border-top:1px solid #94a3b826}
  </style>
</head>
<body>
  <div class="app">
    <header><div class="bar"><div class="brand"><a href="index.html"><span class="logo" aria-hidden="true"></span>CODELYFE</a></div><a class="btn" href="index.html">Home</a></div></header>
    <main>
      <h1>JWT Decoder</h1>
      <p class="subtitle">Paste a JWT to decode header and payload. No verification — for debugging only.</p>
      <div class="card">
        <label for="jwtIn">JWT (header.payload.signature)</label>
        <textarea id="jwtIn" placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIn0.…"></textarea>
        <button type="button" class="btn" id="decodeBtn" style="margin-top:12px">Decode</button>
        <div id="headerOut" class="jwt-section" style="display:none"><h3>Header</h3><pre id="headerPre"></pre></div>
        <div id="payloadOut" class="jwt-section" style="display:none"><h3>Payload</h3><pre id="payloadPre"></pre></div>
        <p class="err" id="jwtErr"></p>
      </div>
    </main>
    <footer><a href="index.html">Codelyfe</a> — JWT decoder</footer>
  </div>
  <script>
(function(){
  function b64UrlDecode(str){
    str = str.replace(/-/g, "+").replace(/_/g, "/");
    while (str.length % 4) str += "=";
    try { return decodeURIComponent(escape(atob(str))); } catch(e) { return atob(str); }
  }
  document.getElementById("decodeBtn").addEventListener("click", function(){
    var raw = document.getElementById("jwtIn").value.trim().split(/\s/)[0];
    var err = document.getElementById("jwtErr");
    document.getElementById("headerOut").style.display = "none";
    document.getElementById("payloadOut").style.display = "none";
    err.textContent = "";
    if (!raw) { err.textContent = "Paste a JWT."; return; }
    var parts = raw.split(".");
    if (parts.length !== 3) { err.textContent = "Invalid JWT: expected 3 parts."; return; }
    try {
      var headerStr = b64UrlDecode(parts[0]);
      var payloadStr = b64UrlDecode(parts[1]);
      var header = JSON.parse(headerStr);
      var payload = JSON.parse(payloadStr);
      document.getElementById("headerPre").textContent = JSON.stringify(header, null, 2);
      document.getElementById("payloadPre").textContent = JSON.stringify(payload, null, 2);
      document.getElementById("headerOut").style.display = "block";
      document.getElementById("payloadOut").style.display = "block";
    } catch (e) { err.textContent = e.message; }
  });
})();
  </script>
</body>
</html>
