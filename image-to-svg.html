<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image → SVG</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; max-width: 560px; margin: 2rem auto; padding: 0 1rem; }
        h1 { font-size: 1.25rem; font-weight: 600; }
        .hint { color: #666; margin: 0.75rem 0 1.5rem; font-size: 0.95rem; }
        .preview { margin: 1rem 0; padding: 1rem; background: #f5f5f5; border-radius: 8px; overflow: auto; display: none; }
        .preview img { max-width: 100%; height: auto; display: block; }
        .code-wrap { margin-top: 1rem; display: none; }
        .code-wrap label { display: block; margin-bottom: 0.25rem; font-weight: 500; }
        textarea { width: 100%; min-height: 160px; padding: 0.75rem; font-family: ui-monospace, monospace; font-size: 0.8rem; resize: vertical; }
        .err { color: #c00; margin-top: 0.5rem; }
    </style>
</head>
<body>
    <h1>Image → SVG</h1>
    <p class="hint">Right‑click an image in your browser and choose <strong>Copy image</strong>. Then paste here with Ctrl+V (or Cmd+V).</p>
    <div id="out">
        <div class="preview" id="preview"></div>
        <div class="code-wrap" id="codeWrap">
            <label for="svgcode">SVG code</label>
            <textarea id="svgcode" readonly></textarea>
        </div>
        <p class="err" id="err" style="display:none;"></p>
    </div>
    <script>
        function showErr(msg) {
            var el = document.getElementById('err');
            el.textContent = msg;
            el.style.display = msg ? 'block' : 'none';
        }
        function imageToSvg(dataUri, w, h) {
            return '<?xml version="1.0" encoding="UTF-8"?>\n<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="' + w + '" height="' + h + '" viewBox="0 0 ' + w + ' ' + h + '"><image width="' + w + '" height="' + h + '" href="' + dataUri + '"/></svg>';
        }
        document.addEventListener('paste', function (e) {
            var items = e.clipboardData && e.clipboardData.items;
            if (!items) return;
            for (var i = 0; i < items.length; i++) {
                if (items[i].type.indexOf('image') !== 0) continue;
                e.preventDefault();
                showErr('');
                var file = items[i].getAsFile();
                if (!file) continue;
                var reader = new FileReader();
                reader.onload = function () {
                    var dataUri = reader.result;
                    var img = new Image();
                    img.onload = function () {
                        var w = img.naturalWidth;
                        var h = img.naturalHeight;
                        var svg = imageToSvg(dataUri, w, h);
                        var preview = document.getElementById('preview');
                        preview.innerHTML = '<img src="data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg))) + '" alt="">';
                        preview.style.display = 'block';
                        document.getElementById('codeWrap').style.display = 'block';
                        document.getElementById('svgcode').value = svg;
                    };
                    img.onerror = function () { showErr('Could not read image.'); };
                    img.src = dataUri;
                };
                reader.readAsDataURL(file);
                break;
            }
        });
    </script>
</body>
</html>
