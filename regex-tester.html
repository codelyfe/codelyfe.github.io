<!doctype html>
<html lang="en">
<!-- Randal C. Burger Jr -->
<head>
  <meta charset="utf-8" />
  <title>Regex Tester — Codelyfe</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <meta name="theme-color" content="#0ea5e9" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    :root{--panel:#0f172a;--text:#e5f0ff;--muted:#9db3d1;--brand:#0ea5e9;--brand-2:#14b8a6;--accent:#a78bfa;--ring:0 0 0 3px color-mix(in srgb, var(--brand) 35%, transparent);--glass:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.03));--speed-1:300ms}
    @media (prefers-color-scheme: light){:root{--bg:#f7fbff;--panel:#fff;--text:#0b1220;--muted:#44566c;--glass:linear-gradient(180deg,#fff,#fff7)}}
    *{box-sizing:border-box} html,body{min-height:100%;margin:0}
    body{font:16px/1.55 Inter,system-ui,sans-serif;color:var(--text);background:radial-gradient(1200px 600px at 80% -20%,rgba(78,205,255,.22),transparent 60%),radial-gradient(1000px 600px at -10% -10%,rgba(167,139,250,.22),transparent 55%),var(--bg);overflow-x:hidden}
    a{color:var(--brand);text-decoration:none} a:focus-visible,button:focus-visible,input:focus-visible,textarea:focus-visible{outline:none;box-shadow:var(--ring)}
    .app{min-height:100%;display:grid;grid-template-rows:auto 1fr auto}
    header{position:sticky;top:0;z-index:10;backdrop-filter:saturate(120%) blur(6px);background:linear-gradient(180deg,rgba(2,8,23,.55),rgba(2,8,23,.15));border-bottom:1px solid rgba(148,163,184,.15)}
    .bar{max-width:900px;margin:0 auto;padding:14px 18px;display:flex;align-items:center;justify-content:space-between}
    .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px} .brand a{color:var(--text)}
    .logo{width:32px;height:32px;border-radius:10px;background:conic-gradient(from 180deg,var(--brand),var(--brand-2),var(--accent),var(--brand))}
    .btn{border:1px solid #94a3b83f;background:var(--glass);color:var(--text);padding:10px 14px;border-radius:12px;cursor:pointer;font:600 14px/1 Inter,sans-serif;transition:transform var(--speed-1)} .btn:hover{transform:translateY(-2px)}
    main{max-width:900px;margin:32px auto;padding:0 18px}
    h1{font-weight:800;font-size:clamp(26px,4vw,34px);margin:0 0 8px} .subtitle{color:var(--muted);font-size:15px;margin-bottom:28px}
    .card{background:var(--panel);border-radius:16px;padding:24px;border:1px solid #94a3b82f;margin-bottom:20px}
    label{display:block;font-size:14px;font-weight:600;color:var(--muted);margin-bottom:8px}
    input[type="text"],textarea{width:100%;padding:14px;border-radius:12px;border:1px solid #94a3b83f;background:#0c1222;color:var(--text);font:14px JetBrains Mono,monospace}
    textarea{min-height:140px;resize:vertical}
    .flags{display:flex;flex-wrap:wrap;gap:12px;margin:12px 0;align-items:center}
    .flags label{display:flex;align-items:center;gap:6px;margin:0;font-weight:400;cursor:pointer}
    .highlight{background:rgba(34,197,94,.35);border-radius:2px}
    .match-list{font:13px JetBrains Mono,monospace;margin-top:12px;padding:12px;border-radius:10px;background:rgba(20,184,166,.1);border:1px solid rgba(20,184,166,.3)}
    .match-list div{margin:4px 0}
    .err{color:#f87171;font-size:14px} footer{padding:24px 18px;color:var(--muted);text-align:center;border-top:1px solid #94a3b826}
  </style>
</head>
<body>
  <div class="app">
    <header><div class="bar"><div class="brand"><a href="index.html"><span class="logo" aria-hidden="true"></span>CODELYFE</a></div><a class="btn" href="index.html">Home</a></div></header>
    <main>
      <h1>Regex Tester</h1>
      <p class="subtitle">Test regular expressions against sample text. See matches and capture groups.</p>
      <div class="card">
        <label for="regexIn">Regular expression</label>
        <input type="text" id="regexIn" placeholder="e.g. /hello\\w*/g or (\\d+)\\.(\\d+)" />
        <div class="flags">
          <label><input type="checkbox" id="flagG" /> Global (g)</label>
          <label><input type="checkbox" id="flagI" /> Ignore case (i)</label>
          <label><input type="checkbox" id="flagM" /> Multiline (m)</label>
        </div>
        <label for="sampleIn">Sample text</label>
        <textarea id="sampleIn" placeholder="Paste or type text to test against…"></textarea>
        <div style="margin-top:16px">
          <label>Result</label>
          <div id="resultOut" style="min-height:80px;padding:14px;border-radius:12px;border:1px solid #94a3b83f;background:#0c1222;white-space:pre-wrap;word-break:break-all"></div>
          <div id="matchOut" class="match-list" style="display:none"></div>
        </div>
        <p class="err" id="regexErr"></p>
      </div>
    </main>
    <footer><a href="index.html">Codelyfe</a> — Regex tester</footer>
  </div>
  <script>
(function(){
  function run(){
    var reStr = document.getElementById("regexIn").value.trim();
    var sample = document.getElementById("sampleIn").value;
    var err = document.getElementById("regexErr");
    var resultOut = document.getElementById("resultOut");
    var matchOut = document.getElementById("matchOut");
    err.textContent = "";
    matchOut.style.display = "none";
    if (!reStr) { resultOut.textContent = "Enter a regex."; return; }
    var flags = (document.getElementById("flagG").checked ? "g" : "") + (document.getElementById("flagI").checked ? "i" : "") + (document.getElementById("flagM").checked ? "m" : "");
    if (reStr.charAt(0) === "/") {
      var end = reStr.lastIndexOf("/");
      if (end > 0) { flags = reStr.slice(end + 1) || flags; reStr = reStr.slice(1, end); }
    }
    try {
      var re = new RegExp(reStr, flags);
      var matches = [], m;
      if (re.global) {
        while ((m = re.exec(sample)) !== null) { matches.push(m); }
      } else {
        m = re.exec(sample); if (m) matches.push(m);
      }
      if (matches.length === 0) { resultOut.textContent = "No matches."; return; }
      var spans = [], last = 0;
      matches.forEach(function(m){
        if (m.index > last) spans.push({ type: "text", s: sample.slice(last, m.index) });
        spans.push({ type: "match", s: m[0] });
        last = m.index + m[0].length;
      });
      if (last < sample.length) spans.push({ type: "text", s: sample.slice(last) });
      resultOut.innerHTML = spans.map(function(x){ var h = escapeHtml(x.s).replace(/\n/g, "<br>"); return x.type === "match" ? "<span class=\"highlight\">" + h + "</span>" : h; }).join("");
      matchOut.style.display = "block";
      matchOut.innerHTML = "<strong>Matches (" + matches.length + "):</strong>" + matches.map(function(m, i){
        var parts = ["Match " + (i+1) + ": \"" + escapeHtml(m[0]) + "\""];
        if (m.length > 1) for (var c = 1; c < m.length; c++) parts.push("  Group " + c + ": \"" + escapeHtml(m[c] || "") + "\"");
        return "<div>" + parts.join("<br>") + "</div>";
      }).join("");
    } catch (e) { err.textContent = e.message; resultOut.textContent = ""; }
  }
  function escapeHtml(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
  document.getElementById("regexIn").addEventListener("input", run);
  document.getElementById("sampleIn").addEventListener("input", run);
  document.querySelectorAll(".flags input").forEach(function(cb){ cb.addEventListener("change", run); });
  document.getElementById("resultOut").textContent = "Enter a regex and sample text.";
})();
  </script>
</body>
</html>
