<!doctype html>
<html lang="en">
<!-- Randal C. Burger Jr -->
<head>
  <meta charset="utf-8" />
  <title>Image Compressor — Codelyfe</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <meta name="theme-color" content="#0ea5e9" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    :root{--panel:#0f172a;--text:#e5f0ff;--muted:#9db3d1;--brand:#0ea5e9;--brand-2:#14b8a6;--accent:#a78bfa;--ring:0 0 0 3px color-mix(in srgb, var(--brand) 35%, transparent);--glass:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.03));--speed-1:300ms}
    @media (prefers-color-scheme: light){:root{--bg:#f7fbff;--panel:#fff;--text:#0b1220;--muted:#44566c;--glass:linear-gradient(180deg,#fff,#fff7)}}
    *{box-sizing:border-box} html,body{min-height:100%;margin:0}
    body{font:16px/1.55 Inter,system-ui,sans-serif;color:var(--text);background:radial-gradient(1200px 600px at 80% -20%,rgba(78,205,255,.22),transparent 60%),radial-gradient(1000px 600px at -10% -10%,rgba(167,139,250,.22),transparent 55%),var(--bg);overflow-x:hidden}
    a{color:var(--brand);text-decoration:none} a:focus-visible,button:focus-visible,input:focus-visible{outline:none;box-shadow:var(--ring)}
    .app{min-height:100%;display:grid;grid-template-rows:auto 1fr auto}
    header{position:sticky;top:0;z-index:10;backdrop-filter:saturate(120%) blur(6px);background:linear-gradient(180deg,rgba(2,8,23,.55),rgba(2,8,23,.15));border-bottom:1px solid rgba(148,163,184,.15)}
    .bar{max-width:900px;margin:0 auto;padding:14px 18px;display:flex;align-items:center;justify-content:space-between}
    .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px} .brand a{color:var(--text)}
    .logo{width:32px;height:32px;border-radius:10px;background:conic-gradient(from 180deg,var(--brand),var(--brand-2),var(--accent),var(--brand))}
    .btn{border:1px solid #94a3b83f;background:var(--glass);color:var(--text);padding:10px 14px;border-radius:12px;cursor:pointer;font:600 14px/1 Inter,sans-serif;transition:transform var(--speed-1)} .btn:hover{transform:translateY(-2px)} .btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
    main{max-width:700px;margin:32px auto;padding:0 18px}
    h1{font-weight:800;font-size:clamp(26px,4vw,34px);margin:0 0 8px} .subtitle{color:var(--muted);font-size:15px;margin-bottom:28px}
    .card{background:var(--panel);border-radius:16px;padding:24px;border:1px solid #94a3b82f;margin-bottom:20px}
    .drop-zone{border:2px dashed #94a3b85c;border-radius:14px;padding:32px;text-align:center;cursor:pointer;background:rgba(255,255,255,.03)} .drop-zone:hover,.drop-zone.dragover{border-color:var(--brand)} .drop-zone input{display:none} .drop-zone p{margin:0;color:var(--muted)}
    .row{display:flex;flex-wrap:wrap;gap:16px;align-items:center;margin-top:16px}
    label{font-size:14px;font-weight:600;color:var(--muted)} input[type="number"]{width:80px;padding:10px;border-radius:10px;border:1px solid #94a3b83f;background:var(--panel);color:var(--text)}
    select{padding:10px 14px;border-radius:10px;border:1px solid #94a3b83f;background:var(--panel);color:var(--text);font:14px Inter,sans-serif}
    .out{display:none;margin-top:20px} .out.visible{display:block} .out img{max-width:100%;height:auto;border-radius:12px;border:1px solid #94a3b83f}
    .err{color:#f87171;font-size:14px;margin-top:10px} footer{padding:24px 18px;color:var(--muted);text-align:center;border-top:1px solid #94a3b826}
  </style>
</head>
<body>
  <div class="app">
    <header><div class="bar"><div class="brand"><a href="index.html"><span class="logo" aria-hidden="true"></span>CODELYFE</a></div><a class="btn" href="index.html">Home</a></div></header>
    <main>
      <h1>Image Compressor</h1>
      <p class="subtitle">Reduce image file size with quality and max dimension settings. Output JPEG or WebP.</p>
      <div class="card">
        <div class="drop-zone" id="dropZone"><input type="file" id="fileIn" accept="image/*" /><p><strong>Choose an image</strong> or drag it here</p></div>
        <div class="row">
          <label>Format:</label>
          <select id="format"><option value="image/jpeg">JPEG</option><option value="image/webp">WebP</option></select>
          <label>Quality (0–1):</label>
          <input type="number" id="quality" min="0.1" max="1" step="0.05" value="0.82" style="width:90px" />
          <label>Max width:</label>
          <input type="number" id="maxW" placeholder="none" min="1" style="width:90px" />
          <label>Max height:</label>
          <input type="number" id="maxH" placeholder="none" min="1" style="width:90px" />
        </div>
        <div class="row" style="margin-top:12px"><button type="button" class="btn" id="compressBtn" disabled>Compress & download</button></div>
        <div class="out" id="out"><p id="outMsg"></p><img id="outImg" alt="" style="display:none" /></div>
        <p class="err" id="err"></p>
      </div>
    </main>
    <footer><a href="index.html">Codelyfe</a> — Image compressor</footer>
  </div>
  <script>
(function(){
  var currentFile = null;
  var dropZone = document.getElementById("dropZone");
  var fileIn = document.getElementById("fileIn");
  var compressBtn = document.getElementById("compressBtn");
  var err = document.getElementById("err");
  var out = document.getElementById("out");
  var outMsg = document.getElementById("outMsg");
  var outImg = document.getElementById("outImg");
  dropZone.addEventListener("click", function(){ fileIn.click(); });
  dropZone.addEventListener("dragover", function(e){ e.preventDefault(); dropZone.classList.add("dragover"); });
  dropZone.addEventListener("dragleave", function(){ dropZone.classList.remove("dragover"); });
  dropZone.addEventListener("drop", function(e){ e.preventDefault(); dropZone.classList.remove("dragover"); var f = e.dataTransfer.files[0]; if (f && f.type.indexOf("image/")===0) setFile(f); });
  fileIn.addEventListener("change", function(){ var f = this.files[0]; if (f) setFile(f); });
  function setFile(f){ currentFile = f; compressBtn.disabled = false; err.textContent = ""; out.classList.remove("visible"); }
  compressBtn.addEventListener("click", function(){
    if (!currentFile) return;
    err.textContent = "";
    var format = document.getElementById("format").value;
    var quality = parseFloat(document.getElementById("quality").value) || 0.82;
    var maxW = parseInt(document.getElementById("maxW").value, 10) || 0;
    var maxH = parseInt(document.getElementById("maxH").value, 10) || 0;
    var img = new Image();
    img.onload = function(){
      var w = img.naturalWidth, h = img.naturalHeight;
      if (maxW > 0 || maxH > 0) {
        var r = Math.min(maxW > 0 ? maxW/w : 1, maxH > 0 ? maxH/h : 1);
        if (r < 1) { w = Math.round(w*r); h = Math.round(h*r); }
      }
      var c = document.createElement("canvas"); c.width = w; c.height = h;
      c.getContext("2d").drawImage(img, 0, 0, w, h);
      c.toBlob(function(blob){
        if (!blob) { err.textContent = "Compression failed."; return; }
        var ext = format === "image/webp" ? "webp" : "jpg";
        var a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = (currentFile.name.replace(/\.[^.]*$/, "") || "image") + "-compressed." + ext; a.click(); URL.revokeObjectURL(a.href);
        outMsg.textContent = "Downloaded. Original: " + (currentFile.size/1024).toFixed(1) + " KB → Compressed: " + (blob.size/1024).toFixed(1) + " KB";
        out.classList.add("visible"); outImg.style.display = "none";
      }, format, quality);
    };
    img.onerror = function(){ err.textContent = "Could not load image."; };
    img.src = URL.createObjectURL(currentFile);
  });
})();
  </script>
</body>
</html>
