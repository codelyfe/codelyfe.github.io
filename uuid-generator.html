<!doctype html>
<html lang="en">
<!-- Randal C. Burger Jr -->
<head>
  <meta charset="utf-8" />
  <title>UUID Generator — Codelyfe</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <meta name="theme-color" content="#0ea5e9" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    :root{--panel:#0f172a;--text:#e5f0ff;--muted:#9db3d1;--brand:#0ea5e9;--brand-2:#14b8a6;--accent:#a78bfa;--ring:0 0 0 3px color-mix(in srgb, var(--brand) 35%, transparent);--glass:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.03));--speed-1:300ms}
    @media (prefers-color-scheme: light){:root{--bg:#f7fbff;--panel:#fff;--text:#0b1220;--muted:#44566c;--glass:linear-gradient(180deg,#fff,#fff7)}}
    *{box-sizing:border-box} html,body{min-height:100%;margin:0}
    body{font:16px/1.55 Inter,system-ui,sans-serif;color:var(--text);background:radial-gradient(1200px 600px at 80% -20%,rgba(78,205,255,.22),transparent 60%),radial-gradient(1000px 600px at -10% -10%,rgba(167,139,250,.22),transparent 55%),var(--bg);overflow-x:hidden}
    a{color:var(--brand);text-decoration:none} a:focus-visible,button:focus-visible,input:focus-visible{outline:none;box-shadow:var(--ring)}
    .app{min-height:100%;display:grid;grid-template-rows:auto 1fr auto}
    header{position:sticky;top:0;z-index:10;backdrop-filter:saturate(120%) blur(6px);background:linear-gradient(180deg,rgba(2,8,23,.55),rgba(2,8,23,.15));border-bottom:1px solid rgba(148,163,184,.15)}
    .bar{max-width:900px;margin:0 auto;padding:14px 18px;display:flex;align-items:center;justify-content:space-between}
    .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px} .brand a{color:var(--text)}
    .logo{width:32px;height:32px;border-radius:10px;background:conic-gradient(from 180deg,var(--brand),var(--brand-2),var(--accent),var(--brand))}
    .btn{border:1px solid #94a3b83f;background:var(--glass);color:var(--text);padding:10px 14px;border-radius:12px;cursor:pointer;font:600 14px/1 Inter,sans-serif;transition:transform var(--speed-1)} .btn:hover{transform:translateY(-2px)}
    main{max-width:700px;margin:32px auto;padding:0 18px}
    h1{font-weight:800;font-size:clamp(26px,4vw,34px);margin:0 0 8px} .subtitle{color:var(--muted);font-size:15px;margin-bottom:28px}
    .card{background:var(--panel);border-radius:16px;padding:24px;border:1px solid #94a3b82f;margin-bottom:20px}
    label{display:block;font-size:14px;font-weight:600;color:var(--muted);margin-bottom:8px}
    input[type="text"]{width:100%;max-width:480px;padding:14px;border-radius:12px;border:1px solid #94a3b83f;background:#0c1222;color:var(--text);font:16px JetBrains Mono,monospace}
    input[type="number"]{width:80px;padding:10px;border-radius:10px;border:1px solid #94a3b83f;background:var(--panel);color:var(--text)}
    .row{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin:16px 0}
    textarea{width:100%;min-height:120px;padding:14px;border-radius:12px;border:1px solid #94a3b83f;background:#0c1222;color:var(--text);font:13px JetBrains Mono,monospace;resize:vertical}
    footer{padding:24px 18px;color:var(--muted);text-align:center;border-top:1px solid #94a3b826}
  </style>
</head>
<body>
  <div class="app">
    <header><div class="bar"><div class="brand"><a href="index.html"><span class="logo" aria-hidden="true"></span>CODELYFE</a></div><a class="btn" href="index.html">Home</a></div></header>
    <main>
      <h1>UUID Generator</h1>
      <p class="subtitle">Generate UUIDs v4 (random) with crypto.getRandomValues. Copy one or bulk generate.</p>
      <div class="card">
        <label for="uuidOut">UUID</label>
        <input type="text" id="uuidOut" readonly placeholder="Click Generate" />
        <div class="row">
          <button type="button" class="btn" id="genOne">Generate one</button>
          <button type="button" class="btn" id="copyOne">Copy</button>
        </div>
        <label style="margin-top:20px">Bulk generate</label>
        <div class="row">
          <label style="margin:0;font-weight:400">Count:</label>
          <input type="number" id="count" min="1" max="500" value="10" />
          <button type="button" class="btn" id="genBulk">Generate</button>
        </div>
        <textarea id="bulkOut" readonly placeholder="Bulk UUIDs will appear here"></textarea>
        <button type="button" class="btn" id="copyBulk" style="margin-top:8px">Copy all</button>
      </div>
    </main>
    <footer><a href="index.html">Codelyfe</a> — UUID generator</footer>
  </div>
  <script>
(function(){
  function uuidv4(){
    var buf = new Uint8Array(16);
    crypto.getRandomValues(buf);
    buf[6] = (buf[6] & 15) | 64;
    buf[8] = (buf[8] & 63) | 128;
    var h = function(b){ return b.toString(16).padStart(2,"0"); };
    return h(buf[0])+h(buf[1])+h(buf[2])+h(buf[3])+"-"+h(buf[4])+h(buf[5])+"-"+h(buf[6])+h(buf[7])+"-"+h(buf[8])+h(buf[9])+"-"+h(buf[10])+h(buf[11])+h(buf[12])+h(buf[13])+h(buf[14])+h(buf[15]);
  }
  document.getElementById("genOne").addEventListener("click", function(){ document.getElementById("uuidOut").value = uuidv4(); });
  document.getElementById("copyOne").addEventListener("click", function(){ var v = document.getElementById("uuidOut").value; if (v) navigator.clipboard.writeText(v); });
  document.getElementById("genBulk").addEventListener("click", function(){
    var n = Math.max(1, Math.min(500, parseInt(document.getElementById("count").value, 10) || 10));
    var list = []; for (var i = 0; i < n; i++) list.push(uuidv4());
    document.getElementById("bulkOut").value = list.join("\n");
  });
  document.getElementById("copyBulk").addEventListener("click", function(){ var v = document.getElementById("bulkOut").value; if (v) navigator.clipboard.writeText(v); });
})();
  </script>
</body>
</html>
