<!doctype html>
<html lang="en">
<!-- Randal C. Burger Jr -->
<head>
  <meta charset="utf-8" />
  <title>Document Converter — Codelyfe</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <meta name="theme-color" content="#0ea5e9" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    :root{
      --panel:#0f172a; --text:#e5f0ff; --muted:#9db3d1;
      --brand:#0ea5e9; --brand-2:#14b8a6; --accent:#a78bfa;
      --ring:0 0 0 3px color-mix(in srgb, var(--brand) 35%, transparent);
      --shadow: 0 10px 30px rgba(2,8,23,.35), 0 2px 8px rgba(2,8,23,.25);
      --glass: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03));
      --speed-1:300ms;
    }
    @media (prefers-color-scheme: light){
      :root{ --bg:#f7fbff; --panel:#ffffff; --text:#0b1220; --muted:#44566c;
        --shadow:0 10px 30px rgba(2,8,23,.15),0 2px 8px rgba(2,8,23,.08);
        --glass:linear-gradient(180deg,#fff,#fff7);
      }
    }
    *{box-sizing:border-box}
    html,body{min-height:100%;margin:0}
    body{
      font:16px/1.55 Inter,system-ui,sans-serif; color:var(--text);
      background: radial-gradient(1200px 600px at 80% -20%,rgba(78,205,255,.22),transparent 60%),
        radial-gradient(1000px 600px at -10% -10%,rgba(167,139,250,.22),transparent 55%), var(--bg);
      overflow-x:hidden;
    }
    a{color:var(--brand);text-decoration:none}
    a:focus-visible,button:focus-visible,input:focus-visible{outline:none;box-shadow:var(--ring)}
    .app{min-height:100%;display:grid;grid-template-rows:auto 1fr auto}
    header{
      position:sticky;top:0;z-index:10;backdrop-filter:saturate(120%) blur(6px);
      background:linear-gradient(180deg, rgba(2,8,23,.55), rgba(2,8,23,.15));
      border-bottom:1px solid rgba(148,163,184,.15);
    }
    .bar{max-width:900px;margin:0 auto;padding:14px 18px;display:flex;align-items:center;justify-content:space-between}
    .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px}
    .brand a{color:var(--text)}
    .logo{width:32px;height:32px;border-radius:10px;background:conic-gradient(from 180deg,var(--brand),var(--brand-2),var(--accent),var(--brand))}
    .btn{border:1px solid #94a3b83f;background:var(--glass);color:var(--text);padding:10px 14px;border-radius:12px;cursor:pointer;font:600 14px/1 Inter,sans-serif;transition:transform var(--speed-1)}
    .btn:hover{transform:translateY(-2px)}
    .btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
    main{max-width:700px;margin:32px auto;padding:0 18px}
    h1{font-weight:800;font-size:clamp(26px,4vw,34px);margin:0 0 8px}
    .subtitle{color:var(--muted);font-size:15px;margin-bottom:28px}
    .card{background:var(--panel);border-radius:16px;padding:24px;border:1px solid #94a3b82f;margin-bottom:20px}
    .drop-zone{
      border:2px dashed #94a3b85c;border-radius:14px;padding:32px;text-align:center;cursor:pointer;
      background:rgba(255,255,255,.03);transition:border-color var(--speed-1),background var(--speed-1)
    }
    .drop-zone:hover,.drop-zone.dragover{border-color:var(--brand);background:rgba(14,165,233,.08)}
    .drop-zone input{display:none}
    .drop-zone p{margin:0;color:var(--muted)}.drop-zone p strong{color:var(--text)}
    .file-uploaded{display:none;margin-top:14px;padding:12px 14px;border-radius:12px;border:1px solid rgba(20,184,166,.4);background:rgba(20,184,166,.12);align-items:center;gap:10px;flex-wrap:wrap}
    .file-uploaded.visible{display:flex}
    .file-uploaded .name{font-weight:600;color:var(--text);flex:1 1 auto;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .file-uploaded .size{font-size:13px;color:var(--muted)}
    .file-uploaded .clear{margin-left:auto;padding:6px 10px;font-size:13px}
    .row{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-top:20px}
    label{font-weight:600;font-size:14px;color:var(--muted)}
    select{padding:10px 14px;border-radius:12px;border:1px solid #94a3b83f;background:var(--panel);color:var(--text);font:14px Inter,sans-serif;min-width:180px}
    .out-section{display:none;margin-top:24px}
    .out-section.visible{display:block}
    .out-section a.btn{margin-top:10px;display:inline-block}
    .err{color:#f87171;font-size:14px;margin-top:10px}
    footer{padding:24px 18px;color:var(--muted);text-align:center;border-top:1px solid #94a3b826}
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="bar">
        <div class="brand">
          <a href="index.html"><span class="logo" aria-hidden="true"></span>CODELYFE</a>
        </div>
        <a class="btn" href="index.html">Home</a>
      </div>
    </header>
    <main>
      <h1>Document Converter</h1>
      <p class="subtitle">Upload a document and convert it to another format. All processing happens in your browser.</p>

      <div class="card">
        <div class="drop-zone" id="dropZone" role="button" tabindex="0">
          <input type="file" id="fileIn" accept=".pdf,.doc,.docx,.txt,.html,.htm,.md,.png,.jpg,.jpeg,.gif,.webp" />
          <p><strong>Choose a file</strong> or drag it here</p>
          <p style="font-size:13px;margin-top:6px">PDF, DOCX, TXT, HTML, Markdown, PNG, JPG, WebP, GIF</p>
        </div>
        <div class="file-uploaded" id="fileUploaded" aria-live="polite">
          <span class="name" id="fileName"></span>
          <span class="size" id="fileSize"></span>
          <button type="button" class="btn clear" id="clearFile" aria-label="Remove file">Clear</button>
        </div>
        <div class="row">
          <label for="toFormat">Convert to</label>
          <select id="toFormat">
            <option value="pdf">PDF</option>
            <option value="png">PNG</option>
            <option value="jpeg">JPEG</option>
            <option value="webp">WebP</option>
            <option value="txt">Plain text</option>
            <option value="html">HTML</option>
          </select>
          <button type="button" class="btn" id="convertBtn" disabled>Convert</button>
        </div>
        <div class="out-section" id="outSection">
          <p class="out-msg" id="outMsg"></p>
          <a id="downloadLink" class="btn" href="#" download style="display:none">Download</a>
        </div>
        <p class="err" id="err" aria-live="polite"></p>
      </div>
    </main>
    <footer><a href="index.html">Codelyfe</a> — client-side document converter</footer>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
  <script>
(function(){
  var dropZone = document.getElementById("dropZone");
  var fileIn = document.getElementById("fileIn");
  var toFormat = document.getElementById("toFormat");
  var convertBtn = document.getElementById("convertBtn");
  var outSection = document.getElementById("outSection");
  var outMsg = document.getElementById("outMsg");
  var downloadLink = document.getElementById("downloadLink");
  var errEl = document.getElementById("err");
  var fileUploadedEl = document.getElementById("fileUploaded");
  var fileNameEl = document.getElementById("fileName");
  var fileSizeEl = document.getElementById("fileSize");

  var currentFile = null;
  var currentName = "";

  function formatBytes(n){ if (n < 1024) return n + " B"; if (n < 1024*1024) return (n/1024).toFixed(1) + " KB"; return (n/(1024*1024)).toFixed(1) + " MB"; }
  function showErr(msg){ errEl.textContent = msg || ""; }
  function showOut(msg, showLink){ outSection.classList.add("visible"); outMsg.textContent = msg || ""; downloadLink.style.display = showLink ? "inline-block" : "none"; }

  dropZone.addEventListener("click", function(){ fileIn.click(); });
  dropZone.addEventListener("dragover", function(e){ e.preventDefault(); dropZone.classList.add("dragover"); });
  dropZone.addEventListener("dragleave", function(){ dropZone.classList.remove("dragover"); });
  dropZone.addEventListener("drop", function(e){
    e.preventDefault();
    dropZone.classList.remove("dragover");
    var f = e.dataTransfer && e.dataTransfer.files[0];
    if (f) setFile(f);
  });
  dropZone.addEventListener("keydown", function(e){ if (e.key === "Enter" || e.key === " ") { e.preventDefault(); fileIn.click(); } });
  fileIn.addEventListener("change", function(){ var f = fileIn.files[0]; if (f) setFile(f); });

  function setFile(file){
    currentFile = file;
    currentName = file.name.replace(/\.[^.]*$/, "");
    fileNameEl.textContent = file.name;
    fileSizeEl.textContent = formatBytes(file.size);
    fileUploadedEl.classList.add("visible");
    showErr("");
    showOut("", false);
    outSection.classList.remove("visible");
    convertBtn.disabled = false;
    updateFormatOptions();
  }

  document.getElementById("clearFile").addEventListener("click", function(){
    currentFile = null;
    currentName = "";
    fileIn.value = "";
    fileUploadedEl.classList.remove("visible");
    convertBtn.disabled = true;
    showErr("");
    showOut("", false);
    outSection.classList.remove("visible");
  });

  function getExt(){ if (!currentFile) return ""; return (currentFile.name.split(".").pop() || "").toLowerCase(); }
  function isImage(){ var e = getExt(); return ["png","jpg","jpeg","gif","webp"].indexOf(e) >= 0; }
  function isPdf(){ return getExt() === "pdf"; }
  function isDocx(){ var e = getExt(); return e === "docx" || e === "doc"; }
  function isText(){ var e = getExt(); return ["txt","html","htm","md"].indexOf(e) >= 0; }

  function updateFormatOptions(){
    var opts = toFormat.querySelectorAll("option");
    var to = toFormat.value;
    if (isImage()){
      opts[0].disabled = true;  // pdf
      opts[1].disabled = false; opts[2].disabled = false; opts[3].disabled = false;  // png jpeg webp
      opts[4].disabled = true; opts[5].disabled = true;
      if (to === "pdf" || to === "txt" || to === "html") toFormat.value = "png";
    } else if (isPdf()){
      opts[0].disabled = true;
      opts[1].disabled = true; opts[2].disabled = true; opts[3].disabled = true;
      opts[4].disabled = false; opts[5].disabled = true;
      if (to === "pdf" || to === "png" || to === "jpeg" || to === "webp" || to === "html") toFormat.value = "txt";
    } else if (isDocx() || isText()){
      opts[0].disabled = false; opts[4].disabled = false; opts[5].disabled = false;
      opts[1].disabled = true; opts[2].disabled = true; opts[3].disabled = true;
      if (to === "png" || to === "jpeg" || to === "webp") toFormat.value = "pdf";
    }
  }

  convertBtn.addEventListener("click", function(){
    if (!currentFile) return;
    showErr("");
    showOut("Converting…", false);
    outSection.classList.add("visible");
    convertBtn.disabled = true;
    var to = toFormat.value;
    runConvert(currentFile, to).then(function(blob){
      if (!blob){ showOut("Conversion not available for this combination.", false); convertBtn.disabled = false; return; }
      var url = URL.createObjectURL(blob);
      var ext = to === "jpeg" ? "jpg" : to;
      downloadLink.href = url;
      downloadLink.download = currentName + "." + ext;
      showOut("Done. Download your file below.", true);
      convertBtn.disabled = false;
    }).catch(function(e){
      showErr(e && e.message ? e.message : "Conversion failed.");
      showOut("", false);
      convertBtn.disabled = false;
    });
  });

  function runConvert(file, to){
    if (isImage()) return convertImage(file, to);
    if (isPdf()) return convertPdf(file, to);
    if (isDocx()) return convertDocx(file, to);
    if (isText()) return convertText(file, to);
    return Promise.resolve(null);
  }

  function convertImage(file, to){
    return new Promise(function(resolve, reject){
      var img = new Image();
      img.onload = function(){
        var c = document.createElement("canvas");
        c.width = img.naturalWidth;
        c.height = img.naturalHeight;
        var ctx = c.getContext("2d");
        ctx.drawImage(img, 0, 0);
        var mime = "image/png";
        if (to === "jpeg") mime = "image/jpeg";
        else if (to === "webp") mime = "image/webp";
        c.toBlob(function(blob){ resolve(blob); }, mime, 0.92);
      };
      img.onerror = function(){ reject(new Error("Could not load image")); };
      img.src = URL.createObjectURL(file);
    });
  }

  function convertPdf(file, to){
    if (to !== "txt") return Promise.resolve(null);
    var pdfjsLib = window.pdfjsLib;
    if (!pdfjsLib){ return Promise.reject(new Error("PDF.js not loaded")); }
    pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js";
    return new Promise(function(resolve, reject){
      var reader = new FileReader();
      reader.onload = function(){
        var buf = reader.result;
        pdfjsLib.getDocument({ data: buf }).promise.then(function(pdf){
          var n = pdf.numPages;
          var parts = [];
          function next(pageno){
            if (pageno > n){ resolve(new Blob([parts.join("\n\n")], { type: "text/plain" })); return; }
            pdf.getPage(pageno).then(function(page){ return page.getTextContent(); }).then(function(tc){
              parts.push(tc.items.map(function(it){ return it.str; }).join(" "));
              next(pageno + 1);
            }).catch(reject);
          }
          next(1);
        }).catch(reject);
      };
      reader.readAsArrayBuffer(file);
    });
  }

  function convertDocx(file, to){
    return new Promise(function(resolve, reject){
      var reader = new FileReader();
      reader.onload = function(){
        mammoth.convertToHtml({ arrayBuffer: reader.result }).then(function(result){
          var html = result.value;
          if (to === "html"){ resolve(new Blob([html], { type: "text/html" })); return; }
          if (to === "txt"){
            var div = document.createElement("div");
            div.innerHTML = html;
            var text = (div.textContent || div.innerText || "").trim();
            resolve(new Blob([text], { type: "text/plain" }));
            return;
          }
          if (to === "pdf"){ textToPdf(html, resolve, reject); return; }
          resolve(null);
        }).catch(reject);
      };
      reader.readAsArrayBuffer(file);
    });
  }

  function convertText(file, to){
    return new Promise(function(resolve, reject){
      var reader = new FileReader();
      reader.onload = function(){
        var raw = reader.result;
        var ext = getExt();
        var html = raw;
        if (ext === "md") html = typeof marked !== "undefined" ? marked.parse(raw) : raw;
        if (to === "html"){ resolve(new Blob([html], { type: "text/html" })); return; }
        if (to === "txt"){
          var div = document.createElement("div");
          div.innerHTML = html;
          resolve(new Blob([(div.textContent || div.innerText || "").trim()], { type: "text/plain" }));
          return;
        }
        if (to === "pdf"){ textToPdf(html, resolve, reject); return; }
        resolve(null);
      };
      reader.readAsText(file);
    });
  }

  function textToPdf(html, resolve, reject){
    try {
      var div = document.createElement("div");
      div.innerHTML = html;
      var text = (div.textContent || div.innerText || "").trim();
      var jspdf = window.jspdf?.jsPDF || window.jspdf;
      if (!jspdf){ resolve(null); return; }
      var doc = new jspdf();
      var lines = doc.splitTextToSize(text, 180);
      doc.text(lines, 14, 20);
      var blob = doc.output("blob");
      resolve(blob);
    } catch (e) { reject(e); }
  }
})();
  </script>
</body>
</html>
