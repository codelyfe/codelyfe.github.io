<!doctype html>
<html lang="en">
<!-- Randal C. Burger Jr -->
<head>
  <meta charset="utf-8" />
  <title>Text Diff — Codelyfe</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <meta name="theme-color" content="#0ea5e9" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    :root{--panel:#0f172a;--text:#e5f0ff;--muted:#9db3d1;--brand:#0ea5e9;--brand-2:#14b8a6;--accent:#a78bfa;--ring:0 0 0 3px color-mix(in srgb, var(--brand) 35%, transparent);--glass:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.03));--speed-1:300ms}
    @media (prefers-color-scheme: light){:root{--bg:#f7fbff;--panel:#fff;--text:#0b1220;--muted:#44566c;--glass:linear-gradient(180deg,#fff,#fff7)}}
    *{box-sizing:border-box} html,body{min-height:100%;margin:0}
    body{font:16px/1.55 Inter,system-ui,sans-serif;color:var(--text);background:radial-gradient(1200px 600px at 80% -20%,rgba(78,205,255,.22),transparent 60%),radial-gradient(1000px 600px at -10% -10%,rgba(167,139,250,.22),transparent 55%),var(--bg);overflow-x:hidden}
    a{color:var(--brand);text-decoration:none} a:focus-visible,button:focus-visible,input:focus-visible,textarea:focus-visible{outline:none;box-shadow:var(--ring)}
    .app{min-height:100%;display:grid;grid-template-rows:auto 1fr auto}
    header{position:sticky;top:0;z-index:10;backdrop-filter:saturate(120%) blur(6px);background:linear-gradient(180deg,rgba(2,8,23,.55),rgba(2,8,23,.15));border-bottom:1px solid rgba(148,163,184,.15)}
    .bar{max-width:1100px;margin:0 auto;padding:14px 18px;display:flex;align-items:center;justify-content:space-between}
    .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px} .brand a{color:var(--text)}
    .logo{width:32px;height:32px;border-radius:10px;background:conic-gradient(from 180deg,var(--brand),var(--brand-2),var(--accent),var(--brand))}
    .btn{border:1px solid #94a3b83f;background:var(--glass);color:var(--text);padding:10px 14px;border-radius:12px;cursor:pointer;font:600 14px/1 Inter,sans-serif;transition:transform var(--speed-1)} .btn:hover{transform:translateY(-2px)}
    main{max-width:1100px;margin:32px auto;padding:0 18px}
    h1{font-weight:800;font-size:clamp(26px,4vw,34px);margin:0 0 8px} .subtitle{color:var(--muted);font-size:15px;margin-bottom:28px}
    .card{background:var(--panel);border-radius:16px;padding:24px;border:1px solid #94a3b82f;margin-bottom:20px}
    .split{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    @media (max-width:700px){.split{grid-template-columns:1fr}}
    label{display:block;font-size:14px;font-weight:600;color:var(--muted);margin-bottom:8px}
    textarea{width:100%;min-height:200px;padding:14px;border-radius:12px;border:1px solid #94a3b83f;background:#0c1222;color:var(--text);font:13px/1.5 JetBrains Mono,monospace;resize:vertical}
    .diff-out{min-height:200px;padding:14px;border-radius:12px;border:1px solid #94a3b83f;background:#0c1222;font:13px/1.5 JetBrains Mono,monospace;white-space:pre-wrap;word-break:break-all;margin-top:16px}
    .diff-add{background:rgba(34,197,94,.25);color:#86efac}
    .diff-rem{background:rgba(239,68,68,.25);color:#fca5a5}
    .toolbar{margin-bottom:12px} footer{padding:24px 18px;color:var(--muted);text-align:center;border-top:1px solid #94a3b826}
  </style>
</head>
<body>
  <div class="app">
    <header><div class="bar"><div class="brand"><a href="index.html"><span class="logo" aria-hidden="true"></span>CODELYFE</a></div><a class="btn" href="index.html">Home</a></div></header>
    <main>
      <h1>Text Diff</h1>
      <p class="subtitle">Compare two text blocks line by line. See what was added or removed.</p>
      <div class="card">
        <div class="split">
          <div><label for="diffA">Original (A)</label><textarea id="diffA" placeholder="Paste first version…"></textarea></div>
          <div><label for="diffB">Modified (B)</label><textarea id="diffB" placeholder="Paste second version…"></textarea></div>
        </div>
        <div class="toolbar"><button type="button" class="btn" id="diffBtn">Compare</button></div>
        <label>Diff result</label>
        <div class="diff-out" id="diffOut">Paste both texts and click Compare.</div>
      </div>
    </main>
    <footer><a href="index.html">Codelyfe</a> — Text diff</footer>
  </div>
  <script>
(function(){
  function lineDiff(a, b){
    var la = a.split(/\r?\n/), lb = b.split(/\r?\n/);
    var setB = {}; lb.forEach(function(l){ setB[l] = (setB[l] || 0) + 1; });
    var out = [], i = 0, j = 0;
    while (i < la.length || j < lb.length) {
      if (i < la.length && j < lb.length && la[i] === lb[j]) { out.push({ type: "same", text: la[i] }); i++; j++; continue; }
      if (j < lb.length && (i >= la.length || (setB[lb[j]] && setB[lb[j]] > 0))) {
        var inA = la.indexOf(lb[j], i);
        if (inA === -1) { out.push({ type: "add", text: lb[j] }); setB[lb[j]]--; j++; continue; }
        while (i < inA) { out.push({ type: "rem", text: la[i] }); i++; }
        continue;
      }
      if (i < la.length) { out.push({ type: "rem", text: la[i] }); i++; }
      else if (j < lb.length) { out.push({ type: "add", text: lb[j] }); j++; }
    }
    return out;
  }
  document.getElementById("diffBtn").addEventListener("click", function(){
    var a = document.getElementById("diffA").value;
    var b = document.getElementById("diffB").value;
    var diff = lineDiff(a, b);
    var html = diff.map(function(d){
      var cls = d.type === "add" ? "diff-add" : d.type === "rem" ? "diff-rem" : "";
      var prefix = d.type === "add" ? "+ " : d.type === "rem" ? "- " : "  ";
      return "<div class=\"" + cls + "\">" + prefix + escapeHtml(d.text || " ") + "</div>";
    }).join("");
    document.getElementById("diffOut").innerHTML = html || "<span style=\"color:var(--muted)\">No differences.</span>";
  });
  function escapeHtml(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
})();
  </script>
</body>
</html>
