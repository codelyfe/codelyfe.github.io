<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image to Data URI Converter</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111827;
      color: #f9fafb;
      min-height: 100vh;
      padding: 24px;
    }
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
    }
    .card {
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 28px;
    }
    p {
      color: #d1d5db;
      line-height: 1.5;
    }
    .controls {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 12px;
      align-items: center;
      margin-top: 16px;
    }
    input[type="file"] {
      width: 100%;
      padding: 12px;
      background: #111827;
      color: #f9fafb;
      border: 1px solid #4b5563;
      border-radius: 10px;
    }
    select, button {
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid #4b5563;
      background: #111827;
      color: #f9fafb;
      cursor: pointer;
    }
    button:hover, select:hover {
      border-color: #60a5fa;
    }
    .preview-box {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 20px;
      margin-top: 20px;
    }
    .preview {
      width: 100%;
      min-height: 260px;
      border: 1px dashed #4b5563;
      border-radius: 14px;
      background: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .preview img {
      max-width: 100%;
      max-height: 400px;
      display: block;
    }
    .preview-placeholder {
      color: #9ca3af;
      padding: 20px;
      text-align: center;
    }
    textarea {
      width: 100%;
      min-height: 420px;
      resize: vertical;
      background: #0f172a;
      color: #93c5fd;
      border: 1px solid #374151;
      border-radius: 14px;
      padding: 16px;
      font-family: Consolas, monospace;
      font-size: 13px;
      line-height: 1.45;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }
    .small {
      color: #9ca3af;
      font-size: 13px;
      margin-top: 10px;
    }
    .stat {
      margin-top: 12px;
      color: #cbd5e1;
      font-size: 14px;
    }
    @media (max-width: 900px) {
      .preview-box {
        grid-template-columns: 1fr;
      }
      .controls {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Image to Data URI Converter</h1>
      <p>Upload an image or paste one (Ctrl+V) and convert it into a data URI like <code>data:image/webp;base64,...</code></p>

      <div class="controls">
        <input type="file" id="imageInput" accept="image/*" />
        <select id="formatSelect">
          <option value="original">Keep Original Format</option>
          <option value="image/png">Convert to PNG</option>
          <option value="image/jpeg">Convert to JPEG</option>
          <option value="image/webp" selected>Convert to WEBP</option>
        </select>
        <button id="convertBtn">Convert</button>
      </div>

      <div class="preview-box">
        <div>
          <div class="preview" id="preview">
            <div class="preview-placeholder">Image preview will appear here</div>
          </div>
          <div class="stat" id="fileInfo">No image selected</div>
        </div>

        <div>
          <textarea id="output" placeholder="Your data URI will appear here..."></textarea>
          <div class="actions">
            <button id="copyBtn">Copy Data URI</button>
            <button id="downloadTxtBtn">Download TXT</button>
            <button id="clearBtn">Clear</button>
          </div>
          <div class="small" id="lengthInfo">Length: 0</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const imageInput = document.getElementById('imageInput');
    const formatSelect = document.getElementById('formatSelect');
    const convertBtn = document.getElementById('convertBtn');
    const preview = document.getElementById('preview');
    const output = document.getElementById('output');
    const copyBtn = document.getElementById('copyBtn');
    const clearBtn = document.getElementById('clearBtn');
    const downloadTxtBtn = document.getElementById('downloadTxtBtn');
    const fileInfo = document.getElementById('fileInfo');
    const lengthInfo = document.getElementById('lengthInfo');

    let currentFile = null;
    let currentImage = null;
    let currentOriginalDataURL = '';

    function loadImageFromBlob(blob, name = 'pasted-image', typeLabel = null) {
      currentFile = null;
      output.value = '';
      updateLength();
      const reader = new FileReader();
      reader.onload = e => {
        currentOriginalDataURL = e.target.result;
        const img = new Image();
        img.onload = () => {
          currentImage = img;
          preview.innerHTML = '';
          const shown = document.createElement('img');
          shown.src = currentOriginalDataURL;
          shown.alt = 'Preview';
          preview.appendChild(shown);
          const type = typeLabel || blob.type || 'image';
          const size = blob.size ? formatBytes(blob.size) : '—';
          fileInfo.textContent = `Name: ${name} | Type: ${type} | Size: ${size} | ${img.width}x${img.height}`;
        };
        img.src = currentOriginalDataURL;
      };
      reader.readAsDataURL(blob);
    }

    function loadImageFromFile(file) {
      currentFile = file;
      loadImageFromBlob(file, file.name, file.type || 'unknown');
    }

    imageInput.addEventListener('change', () => {
      const file = imageInput.files[0];
      if (!file) {
        currentFile = null;
        currentImage = null;
        currentOriginalDataURL = '';
        output.value = '';
        updateLength();
        preview.innerHTML = '<div class="preview-placeholder">Image preview will appear here</div>';
        fileInfo.textContent = 'No image selected';
        return;
      }
      loadImageFromFile(file);
    });

    document.addEventListener('paste', e => {
      const items = e.clipboardData?.items;
      if (!items) return;
      for (const item of items) {
        if (item.type.indexOf('image/') !== 0) continue;
        e.preventDefault();
        const blob = item.getAsFile();
        if (blob) loadImageFromBlob(blob, 'pasted-image.png', blob.type);
        break;
      }
    });

    convertBtn.addEventListener('click', () => {
      if (!currentImage) return;

      const selectedFormat = formatSelect.value;

      if (selectedFormat === 'original') {
        output.value = currentOriginalDataURL;
        updateLength();
        return;
      }

      const canvas = document.createElement('canvas');
      canvas.width = currentImage.naturalWidth || currentImage.width;
      canvas.height = currentImage.naturalHeight || currentImage.height;

      const ctx = canvas.getContext('2d');
      ctx.drawImage(currentImage, 0, 0);

      const quality = selectedFormat === 'image/jpeg' || selectedFormat === 'image/webp' ? 0.92 : undefined;
      const dataURL = canvas.toDataURL(selectedFormat, quality);

      output.value = dataURL;
      updateLength();
    });

    copyBtn.addEventListener('click', async () => {
      if (!output.value.trim()) return;
      await navigator.clipboard.writeText(output.value);
      copyBtn.textContent = 'Copied';
      setTimeout(() => copyBtn.textContent = 'Copy Data URI', 1200);
    });

    downloadTxtBtn.addEventListener('click', () => {
      if (!output.value.trim()) return;
      const blob = new Blob([output.value], { type: 'text/plain;charset=utf-8' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'image-data-uri.txt';
      document.body.appendChild(a);
      a.click();
      URL.revokeObjectURL(a.href);
      a.remove();
    });

    clearBtn.addEventListener('click', () => {
      imageInput.value = '';
      output.value = '';
      currentFile = null;
      currentImage = null;
      currentOriginalDataURL = '';
      preview.innerHTML = '<div class="preview-placeholder">Image preview will appear here</div>';
      fileInfo.textContent = 'No image selected';
      updateLength();
    });

    function updateLength() {
      lengthInfo.textContent = `Length: ${output.value.length.toLocaleString()}`;
    }

    function formatBytes(bytes) {
      if (bytes === 0) return '0 Bytes';
      const sizes = ['Bytes', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(1024));
      return `${(bytes / Math.pow(1024, i)).toFixed(2)} ${sizes[i]}`;
    }
  </script>
</body>
</html>
