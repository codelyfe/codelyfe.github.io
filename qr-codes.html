<!doctype html>
<html lang="en">
<!-- Randal C. Burger Jr -->
<head>
  <meta charset="utf-8" />
  <title>QR Codes — Codelyfe</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <meta name="theme-color" content="#0ea5e9" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    :root{--panel:#0f172a;--text:#e5f0ff;--muted:#9db3d1;--brand:#0ea5e9;--brand-2:#14b8a6;--accent:#a78bfa;--ring:0 0 0 3px color-mix(in srgb, var(--brand) 35%, transparent);--glass:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.03));--speed-1:300ms}
    @media (prefers-color-scheme: light){:root{--bg:#f7fbff;--panel:#fff;--text:#0b1220;--muted:#44566c;--glass:linear-gradient(180deg,#fff,#fff7)}}
    *{box-sizing:border-box} html,body{min-height:100%;margin:0}
    body{font:16px/1.55 Inter,system-ui,sans-serif;color:var(--text);background:radial-gradient(1200px 600px at 80% -20%,rgba(78,205,255,.22),transparent 60%),radial-gradient(1000px 600px at -10% -10%,rgba(167,139,250,.22),transparent 55%),var(--bg);overflow-x:hidden}
    a{color:var(--brand);text-decoration:none} a:focus-visible,button:focus-visible,input:focus-visible{outline:none;box-shadow:var(--ring)}
    .app{min-height:100%;display:grid;grid-template-rows:auto 1fr auto}
    header{position:sticky;top:0;z-index:10;backdrop-filter:saturate(120%) blur(6px);background:linear-gradient(180deg,rgba(2,8,23,.55),rgba(2,8,23,.15));border-bottom:1px solid rgba(148,163,184,.15)}
    .bar{max-width:900px;margin:0 auto;padding:14px 18px;display:flex;align-items:center;justify-content:space-between}
    .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px} .brand a{color:var(--text)}
    .logo{width:32px;height:32px;border-radius:10px;background:conic-gradient(from 180deg,var(--brand),var(--brand-2),var(--accent),var(--brand))}
    .btn{border:1px solid #94a3b83f;background:var(--glass);color:var(--text);padding:10px 14px;border-radius:12px;cursor:pointer;font:600 14px/1 Inter,sans-serif;transition:transform var(--speed-1)} .btn:hover{transform:translateY(-2px)}
    main{max-width:900px;margin:32px auto;padding:0 18px}
    h1{font-weight:800;font-size:clamp(26px,4vw,34px);margin:0 0 8px} .subtitle{color:var(--muted);font-size:15px;margin-bottom:28px}
    .card{background:var(--panel);border-radius:16px;padding:24px;border:1px solid #94a3b82f;margin-bottom:20px}
    .tabs{display:flex;gap:8px;margin-bottom:20px} .tab{padding:10px 16px;border-radius:10px;border:1px solid #94a3b83f;background:var(--glass);color:var(--muted);cursor:pointer;font-weight:600} .tab.active{color:var(--text);border-color:var(--brand);background:rgba(14,165,233,.12)}
    .panel{display:none} .panel.visible{display:block}
    label{display:block;font-size:14px;font-weight:600;color:var(--muted);margin-bottom:8px}
    input[type="text"],textarea{width:100%;max-width:480px;padding:12px 14px;border-radius:12px;border:1px solid #94a3b83f;background:var(--panel);color:var(--text);font:14px Inter,sans-serif}
    textarea{min-height:100px;resize:vertical}
    #qrcodeCanvas{margin-top:16px;background:#fff;padding:12px;border-radius:12px;display:inline-block}
    .scan-zone{border:2px dashed #94a3b85c;border-radius:14px;padding:32px;text-align:center;cursor:pointer;background:rgba(255,255,255,.03);margin-bottom:16px}
    .scan-zone.dragover{border-color:var(--brand)} .scan-zone input{display:none}
    .scan-result{padding:14px;border-radius:12px;background:rgba(20,184,166,.12);border:1px solid rgba(20,184,166,.4);margin-top:12px;word-break:break-all;display:none} .scan-result.visible{display:block}
    .err{color:#f87171;font-size:14px;margin-top:8px} footer{padding:24px 18px;color:var(--muted);text-align:center;border-top:1px solid #94a3b826}
  </style>
</head>
<body>
  <div class="app">
    <header><div class="bar"><div class="brand"><a href="index.html"><span class="logo" aria-hidden="true"></span>CODELYFE</a></div><a class="btn" href="index.html">Home</a></div></header>
    <main>
      <h1>QR Code Generator & Scanner</h1>
      <p class="subtitle">Create QR codes from text or URLs, or scan a QR image from your device. All in the browser.</p>
      <div class="card">
        <div class="tabs">
          <button type="button" class="tab active" data-tab="gen">Generate</button>
          <button type="button" class="tab" data-tab="scan">Scan</button>
        </div>
        <div id="panelGen" class="panel visible">
          <label for="qrInput">Text or URL</label>
          <input type="text" id="qrInput" placeholder="https://example.com or any text" value="https://codelyfe.github.io" />
          <div style="margin-top:16px;"><img id="qrcodeImg" alt="QR code" style="display:none;background:#fff;padding:12px;border-radius:12px;" /></div>
          <button type="button" class="btn" id="downloadQr" style="margin-top:12px">Download PNG</button>
        </div>
        <div id="panelScan" class="panel">
          <label>Drop an image or choose file (QR code image)</label>
          <div class="scan-zone" id="scanZone"><input type="file" id="scanFile" accept="image/*" /><p style="margin:0;color:var(--muted)"><strong style="color:var(--text)">Choose file</strong> or drag here</p></div>
          <div class="scan-result" id="scanResult"></div>
        </div>
        <p class="err" id="err"></p>
      </div>
    </main>
    <footer><a href="index.html">Codelyfe</a> — QR tools</footer>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <script>
(function(){
  var tabs = document.querySelectorAll(".tab");
  var panels = { gen: document.getElementById("panelGen"), scan: document.getElementById("panelScan") };
  tabs.forEach(function(t){ t.addEventListener("click", function(){ tabs.forEach(function(x){ x.classList.remove("active"); }); panels.gen.classList.remove("visible"); panels.scan.classList.remove("visible"); t.classList.add("active"); panels[t.getAttribute("data-tab")].classList.add("visible"); }); });
  var qrInput = document.getElementById("qrInput");
  var qrcodeImg = document.getElementById("qrcodeImg");
  var err = document.getElementById("err");
  var lastDataUrl = null;
  function drawQr(){
    var val = (qrInput.value || "").trim();
    if (!val) { qrcodeImg.style.display = "none"; lastDataUrl = null; return; }
    err.textContent = "";
    if (typeof QRCode === "undefined") { err.textContent = "QRCode library not loaded."; return; }
    var wrap = document.createElement("div");
    wrap.style.position = "absolute";
    wrap.style.left = "-9999px";
    document.body.appendChild(wrap);
    try {
      new QRCode(wrap, { text: val, width: 200, height: 200 });
      var canvas = wrap.querySelector("canvas");
      var img = wrap.querySelector("img");
      if (canvas && typeof canvas.toDataURL === "function") {
        lastDataUrl = canvas.toDataURL("image/png");
      } else if (img && img.src && img.src.indexOf("data:") === 0) {
        lastDataUrl = img.src;
      }
      if (lastDataUrl) {
        qrcodeImg.src = lastDataUrl;
        qrcodeImg.style.display = "block";
      } else {
        err.textContent = "Could not generate QR image.";
      }
    } catch (e) { err.textContent = e.message; }
    if (wrap.parentNode) document.body.removeChild(wrap);
  }
  qrInput.addEventListener("input", drawQr);
  drawQr();
  document.getElementById("downloadQr").addEventListener("click", function(){
    if (!lastDataUrl) { err.textContent = "Enter text first."; return; }
    var a = document.createElement("a"); a.href = lastDataUrl; a.download = "qrcode.png"; a.click();
    err.textContent = "";
  });
  var scanZone = document.getElementById("scanZone");
  var scanFile = document.getElementById("scanFile");
  var scanResult = document.getElementById("scanResult");
  scanZone.addEventListener("click", function(){ scanFile.click(); });
  scanZone.addEventListener("dragover", function(e){ e.preventDefault(); scanZone.classList.add("dragover"); });
  scanZone.addEventListener("dragleave", function(){ scanZone.classList.remove("dragover"); });
  scanZone.addEventListener("drop", function(e){ e.preventDefault(); scanZone.classList.remove("dragover"); var f = e.dataTransfer.files[0]; if (f && f.type.indexOf("image/") === 0) decodeQrFile(f); });
  scanFile.addEventListener("change", function(){ var f = scanFile.files[0]; if (f) decodeQrFile(f); });
  function decodeQrFile(file){
    err.textContent = ""; scanResult.classList.remove("visible"); scanResult.textContent = "";
    var img = new Image();
    img.onload = function(){
      var c = document.createElement("canvas"); c.width = img.naturalWidth; c.height = img.naturalHeight;
      var ctx = c.getContext("2d"); ctx.drawImage(img, 0, 0);
      var data = ctx.getImageData(0, 0, c.width, c.height);
      var code = window.jsQR && jsQR(data.data, data.width, data.height);
      if (code && code.data) { scanResult.textContent = code.data; scanResult.classList.add("visible"); }
      else { err.textContent = "No QR code found in this image."; }
    };
    img.onerror = function(){ err.textContent = "Could not load image."; };
    img.src = URL.createObjectURL(file);
  }
})();
  </script>
</body>
</html>
