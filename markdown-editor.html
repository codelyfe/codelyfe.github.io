<!doctype html>
<html lang="en">
<!-- Randal C. Burger Jr -->
<head>
  <meta charset="utf-8" />
  <title>Markdown Editor — Codelyfe</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <meta name="theme-color" content="#0ea5e9" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    :root{--panel:#0f172a;--text:#e5f0ff;--muted:#9db3d1;--brand:#0ea5e9;--brand-2:#14b8a6;--accent:#a78bfa;--ring:0 0 0 3px color-mix(in srgb, var(--brand) 35%, transparent);--glass:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.03));--speed-1:300ms}
    @media (prefers-color-scheme: light){:root{--bg:#f7fbff;--panel:#fff;--text:#0b1220;--muted:#44566c;--glass:linear-gradient(180deg,#fff,#fff7)}}
    *{box-sizing:border-box} html,body{min-height:100%;margin:0}
    body{font:16px/1.55 Inter,system-ui,sans-serif;color:var(--text);background:radial-gradient(1200px 600px at 80% -20%,rgba(78,205,255,.22),transparent 60%),radial-gradient(1000px 600px at -10% -10%,rgba(167,139,250,.22),transparent 55%),var(--bg);overflow-x:hidden}
    a{color:var(--brand);text-decoration:none} a:focus-visible,button:focus-visible,input:focus-visible,textarea:focus-visible{outline:none;box-shadow:var(--ring)}
    .app{min-height:100%;display:grid;grid-template-rows:auto 1fr auto}
    header{position:sticky;top:0;z-index:10;backdrop-filter:saturate(120%) blur(6px);background:linear-gradient(180deg,rgba(2,8,23,.55),rgba(2,8,23,.15));border-bottom:1px solid rgba(148,163,184,.15)}
    .bar{max-width:1200px;margin:0 auto;padding:14px 18px;display:flex;align-items:center;justify-content:space-between}
    .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px} .brand a{color:var(--text)}
    .logo{width:32px;height:32px;border-radius:10px;background:conic-gradient(from 180deg,var(--brand),var(--brand-2),var(--accent),var(--brand))}
    .btn{border:1px solid #94a3b83f;background:var(--glass);color:var(--text);padding:10px 14px;border-radius:12px;cursor:pointer;font:600 14px/1 Inter,sans-serif;transition:transform var(--speed-1)} .btn:hover{transform:translateY(-2px)}
    main{max-width:1200px;margin:32px auto;padding:0 18px}
    h1{font-weight:800;font-size:clamp(26px,4vw,34px);margin:0 0 8px} .subtitle{color:var(--muted);font-size:15px;margin-bottom:28px}
    .card{background:var(--panel);border-radius:16px;padding:24px;border:1px solid #94a3b82f;margin-bottom:20px}
    .split{display:grid;grid-template-columns:1fr 1fr;gap:20px;min-height:400px}
    @media (max-width:780px){.split{grid-template-columns:1fr}}
    .split label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em}
    .split textarea{width:100%;min-height:380px;padding:14px;border-radius:12px;border:1px solid #94a3b83f;background:#0c1222;color:var(--text);font:14px/1.6 JetBrains Mono,ui-monospace,monospace;resize:vertical}
    .preview{width:100%;min-height:380px;padding:14px;border-radius:12px;border:1px solid #94a3b83f;background:#0c1222;color:var(--text);overflow:auto;font-size:15px}
    .preview h1,.preview h2,.preview h3{margin-top:1em;margin-bottom:.5em} .preview pre{background:#1e293b;padding:12px;border-radius:8px;overflow:auto;font:13px/1.5 JetBrains Mono,monospace}
    .preview code{background:#1e293b;padding:2px 6px;border-radius:4px;font-size:.9em} .preview p{margin:.75em 0}
    .toolbar{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px} .err{color:#f87171;font-size:14px;margin-top:8px}
    footer{padding:24px 18px;color:var(--muted);text-align:center;border-top:1px solid #94a3b826}
  </style>
</head>
<body>
  <div class="app">
    <header><div class="bar"><div class="brand"><a href="index.html"><span class="logo" aria-hidden="true"></span>CODELYFE</a></div><a class="btn" href="index.html">Home</a></div></header>
    <main>
      <h1>Markdown Editor</h1>
      <p class="subtitle">Write Markdown and see live preview. Export as HTML or download your .md file. Powered by marked.js.</p>
      <div class="card">
        <div class="toolbar">
          <button type="button" class="btn" id="copyHtml">Copy as HTML</button>
          <button type="button" class="btn" id="downloadMd">Download .md</button>
        </div>
        <div class="split">
          <div><label for="mdIn">Markdown</label><textarea id="mdIn" placeholder="# Hello\n\nWrite **Markdown** here..."># Welcome\n\n- List item one\n- List item two\n\n**Bold** and *italic*.</textarea></div>
          <div><label>Preview</label><div class="preview" id="preview"></div></div>
        </div>
        <p class="err" id="err"></p>
      </div>
    </main>
    <footer><a href="index.html">Codelyfe</a> — Markdown editor</footer>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <script>
(function(){
  var mdIn = document.getElementById("mdIn");
  var preview = document.getElementById("preview");
  var err = document.getElementById("err");
  function update(){ err.textContent = ""; try { preview.innerHTML = typeof marked !== "undefined" ? marked.parse(mdIn.value) : mdIn.value.replace(/</g,"&lt;"); } catch(e) { err.textContent = e.message; } }
  mdIn.addEventListener("input", update);
  update();
  document.getElementById("copyHtml").addEventListener("click", function(){
    try {
      var html = typeof marked !== "undefined" ? marked.parse(mdIn.value) : mdIn.value;
      navigator.clipboard.writeText(html).then(function(){ err.textContent = "Copied HTML to clipboard."; setTimeout(function(){ err.textContent = ""; }, 2000); }).catch(function(){ err.textContent = "Could not copy."; });
    } catch(e) { err.textContent = e.message; }
  });
  document.getElementById("downloadMd").addEventListener("click", function(){
    var blob = new Blob([mdIn.value], { type: "text/markdown" });
    var a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "document.md"; a.click(); URL.revokeObjectURL(a.href);
  });
})();
  </script>
</body>
</html>
